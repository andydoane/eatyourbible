<head>

  <title>Versey Bird</title>

  <link rel="stylesheet" href="../shared/shell.css" />

</head>

    <!-- BUILT AREA -->
    <div id="builtArea"></div>

    <!-- GAME AREA -->

      <div id="bird">🐤</div>

  <script src="../shared/bridge.js"></script>

</html>
