<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Verse Memory</title>

  <!-- Font (same family as your other apps) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --navH: 70px;
      --safeB: env(safe-area-inset-bottom);
      --safeT: env(safe-area-inset-top);
      --tap: 44px;

      --purple: #7f66c6;
      --dark: rgba(0,0,0,0.30);
    }

    *, *::before, *::after{ box-sizing: border-box; }

    html, body{
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: "Baloo 2", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg, var(--purple));
      color: #fff;
    }

    #app{
      position: fixed;
      inset: 0;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---------- Slide System (Creed/Commandments style) ---------- */
    .slide{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      min-height:0;
      padding-bottom: calc(var(--navH) + var(--safeB));
      transition: transform 320ms ease;
      will-change: transform;
      background: var(--bg, var(--purple));
    }
    .slide.nav-hidden{
      padding-bottom: 0;
    }

    .top{
      padding: calc(14px + var(--safeT)) 18px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height: 60px;
    }
    .titles{
      display:flex;
      flex-direction:column;
      line-height:1.05;
      min-width:0;
    }
    .titles .title{
      font-size: 20px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .titles .subtitle{
      font-size: 14px;
      opacity: 0.92;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding: 8px 18px 18px;
      gap: 14px;
      text-align:center;
    }

    /* ---------- Bottom nav (Creed/Commandments style) ---------- */
    nav#navBar{
      height: var(--navH);
      background: var(--dark);
      display:none;
      justify-content:space-between;
      align-items:center;
      color:white;
      position:fixed;
      left:0; right:0; bottom:0;
      z-index: 9999;
      padding: 0 22px calc(var(--safeB)) 22px;
      box-sizing:border-box;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .nav-btn{
      width: var(--tap);
      height: var(--tap);
      border:none;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.95);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .nav-btn:active{ transform: scale(0.98); }
    .nav-center{
      font-weight: 900;
      font-size: 16px;
      opacity: 0.98;
      letter-spacing: 0.3px;
    }

    .nav-icon{ width:34px; height:34px; display:block; }

    /* ---------- Quiz-style intro ---------- */
    .quiz-intro{
      background: var(--purple);
      color: #fff;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100%;
      text-align:center;
      gap: 16px;
      padding: 24px 18px;
    }
    .quiz-intro img{
      width: min(70vw, 420px);
      max-height: 45vh;
      object-fit: contain;
      animation: introWiggle 1s infinite alternate;
      user-select:none;
    }
    @keyframes introWiggle { 0%{ transform: rotate(-4deg);} 100%{ transform: rotate(4deg);} }
    .presented{ font-size: 16px; font-weight: 800; opacity: 0.95; }
    .site{ font-size: 28px; font-weight: 900; letter-spacing: 0.5px; }
    .hint{ font-size: 13px; opacity: 0.85; }

    /* ---------- Title screen (Creed/Commandments style) ---------- */
    .title-screen{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      height:100%;
      padding: 24px 16px;
      padding-bottom: 110px;
      background: var(--purple);
      color: white;
      text-align:center;
    }
    .title-content{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      width:100%;
      max-width: 700px;
    }
    .title-screen h2{
      font-size: clamp(22px, 5.2vw, 44px);
      font-weight: 800;
      margin: 14px 0 12px;
      text-wrap: balance;
    }
    .title-screen img{
      width: min(80%, 420px);
      max-height: 34vh;
      object-fit: contain;
    }

    .title-carousel{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      width:100%;
      margin-top: 8px;
    }
    .carousel-arrow{
      width: 54px;
      height: 54px;
      padding: 0;
      margin: 10px 0;
      border-radius: 999px;
      background: rgba(0,0,0,0.30);
      color: white;
      border: none;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height: 0;
      cursor:pointer;
    }
    .carousel-main{
      margin: 10px 0;
      flex: 1;
      min-width: 0;
      max-width: 420px;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 900;
      border-radius: 999px;
      border: none;
      background: white;
      color: var(--purple);
      box-shadow: 0 6px 0 rgba(0,0,0,0.25);
      cursor:pointer;
    }
    .carousel-main:active{
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    }
    .carousel-dots{
      display:flex;
      justify-content:center;
      gap: 10px;
      margin-top: 6px;
    }
    .carousel-dot{
      width: 10px; height: 10px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.75);
      opacity: 0.9;
    }
    .carousel-dot.active{ background: rgba(255,255,255,0.95); }

    /* ---------- Verse text ---------- */
    .verse-ref-pill{
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.2px;
      background: rgba(255,255,255,0.95);
      color: #111;
      text-shadow: none;
      padding: 8px 16px;
      border-radius: 999px;
      display:inline-block;
    }
    .verse{
      font-size: clamp(24px, 6.2vw, 52px);
      font-weight: 900;
      line-height: 1.25;
      text-wrap: balance;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
      overflow-wrap: anywhere;
      margin: 0;
    }

    .small{
      font-size: 16px;
      opacity: 0.92;
      line-height: 1.35;
      text-wrap: balance;
    }

/* ---------- Learn (3-zone) layout ---------- */
.learn-layout{
  height: 100%;
  display: flex;
  flex-direction: column;

  /* top padding + side padding */
  padding: calc(14px + var(--safeT)) 18px 18px;

  /* padding between zones */
  gap: 6px;
}

/* Zone 1: reference pill band (target ~10%) */
.learn-ref{
  flex: 0 0 10%;
  min-height: 56px;
  max-height: 96px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Zone 2: verse text band (target ~50%) */
.learn-verse{
  flex: 1 1 50%;
  min-height: 0;               /* important for flex scrolling */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 6px;
  overflow: auto;              /* only scrolls if verse is too long */
   text-align: center; 
   background: rgba(0,0,0,0.40);
border-radius: 18px;
}

.learn-verse.echo-green{
  background: #3fa66b;
}

.learn-layout.game-scramble{
  padding: calc(14px + var(--safeT)) 18px 8px;
  gap: 4px;
}

.learn-layout.game-scramble .learn-ref{
  flex: 0 0 8%;
  min-height: 40px;
  max-height: 60px;
}

.learn-layout.game-scramble .learn-verse{
  flex: 0 0 28%;
  align-items: center;
  justify-content: center;
  padding: 8px 12px;
}

.learn-layout.game-scramble .learn-coach{
  flex: 1 1 auto;
  min-height: 0;
  padding: 0;
  display: flex;
  align-items: stretch;
  justify-content: stretch;
}

.scramble-verse{
  font-size: clamp(18px, 4.8vw, 34px);
  line-height: 1.25;
}

.scramble-field{
  position: relative;
  width: 100%;
  max-width: 760px;
  flex: 1 1 auto;
  min-height: 0;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

.scramble-word{
  position: absolute;
  min-width: 110px;
  max-width: min(220px, calc(100% - 32px));
  padding: 12px 18px;
  border: none;
  border-radius: 999px;
  background: white;
  color: var(--purple);
  font-family: inherit;
  font-size: 18px;
  font-weight: 900;
  box-shadow: 0 6px 0 rgba(0,0,0,0.25);
  cursor: pointer;
  z-index: 2;
  --rot: 0deg;
  --pressY: 0px;
  transform: rotate(var(--rot)) translateY(var(--pressY));
  transform-origin: center center;
}

.scramble-word.color-1{
  background: #ffc751;
  color: #333333;
}

.scramble-word.color-2{
  background: #a7cb6f;
  color: #ffffff;
}

.scramble-word.color-3{
  background: #ff5a51;
  color: #ffffff;
}

.scramble-word.color-4{
  background: #ff8cc8;
  color: #ffffff;
}

.scramble-word.color-5{
  background: #64b5f6;
  color: #ffffff;
}

.scramble-word.shape-slime-blob-soft{
  border-radius: 60px 34px 58px 38px / 42px 36px 46px 34px;
}

.scramble-word.shape-rocket-goo-soft{
  border-radius: 72px 30px 62px 38px / 50px 34px 46px 36px;
  padding-inline: 30px;
}

.scramble-word.shape-zig-round-b{
  border-radius: 18px 40px 18px 40px;
}

.scramble-word.shape-organic-soft-b{
  border-radius: 34px 22px 38px 18px;
}

.scramble-word.shape-splat-pill-soft{
  border-radius: 36px 62px 40px 56px / 46px 38px 36px 50px;
}

.scramble-word.shape-wide-sploosh-b-soft{
  border-radius: 36px 74px 28px 56px / 38px 64px 34px 48px;
  min-width: 170px;
}

.scramble-word.shape-wide-sploosh-soft{
  border-radius: 56px 36px 74px 28px / 48px 38px 64px 34px;
  min-width: 170px;
}

.scramble-word:active{
  --pressY: 4px;
  box-shadow: 0 2px 0 rgba(0,0,0,0.25);
}

.scramble-word.wrong{
  background: #ffb3b3;
  color: #7a1111;
  animation: scrambleShake 0.35s ease;
}

.scramble-popup{
  position: absolute;
  font-size: 24px;
  font-weight: 900;
  pointer-events: none;
  z-index: 3;
  animation: scrambleFloat 0.6s ease forwards;
  text-shadow: 0 2px 8px rgba(0,0,0,0.35);
}

.scramble-popup.good{
  color: #ffd54f;
}

.scramble-popup.bad{
  color: #ffb3b3;
}

.bounce-burst{
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 4;
}

.bounce-debug-line{
  position: absolute;
  top: 0;
  bottom: 0;
  width: 0;
  border-left: 3px dashed rgba(255, 235, 59, 0.95);
  pointer-events: none;
  z-index: 5;
}

.bounce-debug-right-line{
  position: absolute;
  top: 0;
  bottom: 0;
  width: 0;
  border-left: 2px solid rgba(255, 140, 0, 0.95);
  pointer-events: none;
  z-index: 5;
}

.bounce-debug-box{
  position: absolute;
  pointer-events: none;
  border: 2px solid rgba(0, 255, 255, 0.95);
  border-radius: 12px;
  z-index: 5;
}

.scramble-debug-line{
  position: absolute;
  top: 0;
  bottom: 0;
  width: 0;
  border-left: 3px dashed rgba(255, 235, 59, 0.95);
  pointer-events: none;
  z-index: 5;
}

.scramble-word.spawn-in{
  opacity: 0;
  animation: bounceSpawnIn 0.42s cubic-bezier(.2,.8,.2,1) forwards;
}

.scramble-word.burst-out{
  pointer-events: none;
  animation: bounceBurstOut 0.2s ease forwards;
}

@keyframes bounceSpawnIn{
  0%{
    opacity: 0;
    transform: rotate(var(--rot)) translateY(var(--pressY)) scale(0.72);
  }
  70%{
    opacity: 1;
    transform: rotate(var(--rot)) translateY(var(--pressY)) scale(1.04);
  }
  100%{
    opacity: 1;
    transform: rotate(var(--rot)) translateY(var(--pressY)) scale(1);
  }
}

@keyframes bounceBurstOut{
  0%{
    opacity: 1;
    transform: rotate(var(--rot)) translateY(var(--pressY)) scale(1);
  }
  100%{
    opacity: 0;
    transform: rotate(var(--rot)) translateY(var(--pressY)) scale(0.55);
  }
}

@keyframes scrambleFloat{
  0%{ opacity: 0; transform: translate(-50%, 0); }
  20%{ opacity: 1; transform: translate(-50%, -4px); }
  100%{ opacity: 0; transform: translate(-50%, -28px); }
}

@keyframes scrambleShake{
  0%, 100%{
    transform: rotate(var(--rot)) translateY(var(--pressY)) scale(1);
  }
  25%{
    transform: rotate(var(--rot)) translateY(var(--pressY)) scale(1.05);
  }
  50%{
    transform: rotate(var(--rot)) translateY(var(--pressY)) scale(0.98);
  }
  75%{
    transform: rotate(var(--rot)) translateY(var(--pressY)) scale(1.04);
  }
}

/* Zone 3: coach panel band (target ~40%) */
.learn-coach{
  flex: 0 0 40%;
  min-height: 180px;           /* keeps room for button + text on small phones */
  width: 100%;
   background: transparent; 
  color: #fff; 
  border-radius: 18px;
  border: none; 
  padding: 16px 16px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center; 
  align-items: center; 
  gap: 10px;
  box-shadow: none; 
}

.coach-title{
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0.2px;
  text-align: center;
text-transform: uppercase;
letter-spacing: 1px;
}

.coach-text{
  font-size: 15px;
  font-weight: 700;
  opacity: 0.92;
  line-height: 1.25;
  text-align: center;
text-wrap: balance;
}

.coach-status{
  font-size: 14px;
  font-weight: 800;
  opacity: 0.90;
}

.coach-actions{
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 14px;
  align-items: center;
  width: 100%;
}

.learn-coach .carousel-main{
  flex: 0 0 auto;     /* 🚫 do NOT grow vertically */
  width: 100%;
  max-width: 520px;
}

.game-carousel-row{
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.game-carousel-row .carousel-main{
  flex: 1;
  max-width: none;
}

.game-carousel-row + .carousel-dots{
  width: 100%;
  max-width: 760px;
  margin-left: auto;
  margin-right: auto;
}

    /* tappable blanks */
    .hintable{
      display:inline;
      padding: 0 .18em;
      margin: 0 .03em;
      border-radius: .45em;
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.14);
      color: #fff;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .hintable:active{ transform: scale(.99); }
    .hintable.emoji{ background: rgba(0,0,0,0.30); }
    .hintable.underscore{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    .revealed-word{
      color: #ffd54f;
    }

    /* simple progress bar (quiz-esque) */
    .timer-wrap{
      width:100%;
      max-width: 720px;
      height: 12px;
      border-radius: 99px;
      background: rgba(255,255,255,0.18);
      overflow:hidden;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.25);
    }
    .timer-bar{
      height:100%;
      width:0%;
      transform-origin: left center;
      background: rgba(255,255,255,0.92);
      transition: width 120ms linear;
    }

    /* ---------- Overlay modal ---------- */
    .overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,0.85);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      z-index: 20000;
      opacity: 0;
      transition: opacity 220ms ease;
    }
    .overlay.show{
      display:flex;
      opacity: 1;
    }
    .dialog{
      width: min(520px, 100%);
      border-radius: 22px;
      background: rgba(20,20,20,0.92);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      padding: 18px;
      text-align:left;
    }
    .dialog h3{ margin:0 0 8px; font-size:20px; font-weight:900; text-align:center; }
    .dialog p{ margin:0 0 14px; opacity:0.92; line-height:1.35; }
    .dialog .row{ display:flex; gap: 12px; }
    .dlg-btn{
      flex: 1;
      height: 50px;
      border:none;
      border-radius: 16px;
      font-family:inherit;
      font-weight: 900;
      font-size: 18px;
      cursor:pointer;
      background: rgba(255,255,255,0.92);
      color:#111;
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
    }
    .dlg-btn.secondary{
      background: transparent;
      color: rgba(255,255,255,0.95);
      border:2px solid rgba(255,255,255,0.55);
      box-shadow:none;
    }

    /* prevent iOS double-tap zoom on controls */
    .no-zoom{
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

.celebration-screen{
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 24px 18px 110px;
  text-align: center;
  overflow: hidden;
}

.celebration-screen h2{
  font-size: clamp(28px, 7vw, 52px);
  font-weight: 900;
  margin: 0 0 16px;
  text-wrap: balance;
  position: relative;
  z-index: 2;
}

.celebration-actions{
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: min(420px, 100%);
  position: relative;
  z-index: 2;
}

#fireworksCanvas{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* ---------- Traffic Tap ---------- */
.traffic-field{
  position: relative;
  width: 100%;
  max-width: 760px;
  flex: 1 1 auto;
  min-height: 0;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

.traffic-road{
  position: absolute;
  left: 0;
  width: 100%;
  background: #020611;
  border-top: 3px solid #f3c33b;
  border-bottom: 3px solid #f3c33b;
  overflow: hidden;
}

.traffic-road::after{
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: calc(50% - 2px);
  height: 4px;
  background-image: repeating-linear-gradient(
    to right,
    rgba(255,255,255,0.98) 0 18px,
    transparent 18px 34px
  );
  pointer-events: none;
}

.traffic-item{
  position: absolute;
  top: 0;
  left: 0;
  will-change: transform;
}

.traffic-car-btn,
.traffic-word-btn{
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  border: none;
  background: transparent;
  box-shadow: none;
  padding: 0;
  margin: 0;
  color: #fff;
  font-family: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.traffic-car-btn{
  font-size: clamp(28px, 7vw, 40px);
  line-height: 1;
  transform-origin: center center;
  animation: trafficRumble 0.22s infinite alternate ease-in-out;
}

.traffic-word-btn{
  font-size: clamp(18px, 4.9vw, 32px);
  font-weight: 900;
  line-height: 1.05;
  white-space: nowrap;
  text-shadow: 0 2px 8px rgba(0,0,0,0.45);
}

.traffic-car-btn.wrong,
.traffic-word-btn.wrong{
  color: #ff6b6b;
  animation: trafficWrongFlash 0.28s ease;
}

.traffic-done{
  width: 100%;
  max-width: 520px;
  text-align: center;
  font-size: 18px;
  font-weight: 900;
  line-height: 1.35;
}

@keyframes trafficRumble{
  0%{
    transform: translateX(-50%) translateY(-1px) rotate(-2deg);
  }
  100%{
    transform: translateX(-50%) translateY(1px) rotate(2deg);
  }
}

@keyframes trafficWrongFlash{
  0%{ opacity: 1; }
  35%{ opacity: 0.45; }
  100%{ opacity: 1; }
}

  </style>
</head>
<body>
  <div id="app"></div>
  <nav id="navBar"></nav>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="dlgTitle">
    <div class="dialog">
      <h3 id="dlgTitle">Notice</h3>
      <p id="dlgBody">...</p>
      <div class="row" id="dlgActions"></div>
    </div>
  </div>

// tokenization (copied conceptually from old engine)
const TokenType = { SPACE:"space", WORD:"word", PUNCT:"punct", OTHER:"other" };
function tokenize(text){
  const re = /(\s+|[A-Za-z]+(?:'[A-Za-z]+)?|[0-9]+|[^\sA-Za-z0-9]+)/g;
  const raw = text.match(re) || [];
  return raw.map(t => {
    if (/^\s+$/.test(t)) return { type: TokenType.SPACE, text: t };
    if (/^[A-Za-z]+(?:'[A-Za-z]+)?$/.test(t)) return { type: TokenType.WORD, text: t };
    if (/^[0-9]+$/.test(t)) return { type: TokenType.WORD, text: t };
    if (/^[^\sA-Za-z0-9]+$/.test(t)) return { type: TokenType.PUNCT, text: t };
    return { type: TokenType.OTHER, text: t };
  });
}

let tokens = [];
let planResolved = [];
let planMixed = [];
function shuffleArray(arr){
  for (let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function resolveHidePlanToTokenIndices(tokens, plan){
  const wordPositionsByLower = new Map();
  tokens.forEach((tok, idx) => {
    if (tok.type !== TokenType.WORD) return;
    const key = tok.text.toLowerCase();
    if (!wordPositionsByLower.has(key)) wordPositionsByLower.set(key, []);
    wordPositionsByLower.get(key).push(idx);
  });

  return plan.map((item) => {
    const key = String(item.word).toLowerCase();
    const list = wordPositionsByLower.get(key) || [];
    const occ = item.occurrence ?? 1;
    const tokenIndex = list[occ - 1];
    return { ...item, tokenIndex };
  }).filter(x => Number.isFinite(x.tokenIndex));
}
function reshuffleHidePlan(){
  planMixed = shuffleArray([...planResolved]);
}

function verseIdToRef(verseId, translation){
  const parts = verseId.split("_");
  const book = parts[0][0].toUpperCase() + parts[0].slice(1);
  const chapter = parts[1];
  const verses = parts.slice(2);
  const versePart = verses.length === 1 ? verses[0] : `${verses[0]}–${verses[1]}`;
  const t = translation ? ` (${translation})` : "";
  return `${book} ${chapter}:${versePart}${t}`;
}

} catch (err) {

    json = DEBUG_VERSE_JSON;
  } else {
    throw new Error(`Could not load ${DATA_DIR}${verseId}.json (and DEBUG_MODE is off).`);
  }
}

  cfg = json;
  VERSE_ID = json.verseId;
  TRANSLATION = json.translation || "";
  ATTRIBUTION = json.attribution || "";
  VERSE_TEXT = json.verseText || "";
  ECHO_PARTS = Array.isArray(json.echoParts) ? json.echoParts : [];
  HIDE_PLAN = Array.isArray(json.hidePlan) ? json.hidePlan : [];

  VERSE_REF = verseIdToRef(VERSE_ID, TRANSLATION);
  AUDIO_FILE = `${AUDIO_DIR}${VERSE_ID}.mp3`;

  document.title = `Verse Memory • ${VERSE_REF}`;

  tokens = tokenize(VERSE_TEXT);
  planResolved = resolveHidePlanToTokenIndices(tokens, HIDE_PLAN);
  reshuffleHidePlan();
}

function chainPickRandomItems(arr, count, exclude = []){
  const excluded = new Set(exclude.map(x => String(x).toLowerCase()));
  const pool = arr.filter(x => !excluded.has(String(x).toLowerCase()));
  shuffleArray(pool);
  return pool.slice(0, count);
}

function chainVerseMetaFromId(verseId){
  const parts = String(verseId || "").split("_").filter(Boolean);

  let nums = [];
  while (parts.length && /^\d+$/.test(parts[parts.length - 1])){
    nums.unshift(parts.pop());
  }

  const bookSlug = parts.join(" ");
  const book = bookSlug.replace(/\b\w/g, c => c.toUpperCase());

  const chapter = Number(nums[0] || 1);
  const verse = Number(nums[1] || 1);
  const verseEnd = nums[2] ? Number(nums[2]) : null;

  return { book, chapter, verse, verseEnd };
}

function chainMakeBookChoices(correctBook){
  const choices = [
    correctBook,
    ...chainPickRandomItems(BIBLE_BOOKS, 3, [correctBook])

  return shuffleArray(choices);
}

function chainMakeReferenceChoices(correctChapter, correctVerse){
  const correctRef = `${correctChapter}:${correctVerse}`;
  const refs = new Set([correctRef]);

  let tries = 0;
  while (refs.size < 4 && tries < 200){
    const chapterBump = Math.floor(Math.random() * 11) - 5;
    const verseBump = Math.floor(Math.random() * 21) - 10;

    let fakeChapter = correctChapter + chapterBump;
    let fakeVerse = correctVerse + verseBump;

    if (fakeChapter < 1) fakeChapter = 1 + Math.floor(Math.random() * 5);
    if (fakeVerse < 1) fakeVerse = 1 + Math.floor(Math.random() * 10);

    refs.add(`${fakeChapter}:${fakeVerse}`);
    tries += 1;
  }

  return shuffleArray(Array.from(refs));
}

function scrambleWordTokenIndices(){
  const out = [];
  for (let i = 0; i < tokens.length; i++){

}

function scrambleBuiltVerseNode(){
  const p = document.createElement("p");
  p.className = "verse scramble-verse";

  const st = State.scrambleGame;
  const builtCount = st?.builtCount || 0;
  const wordIdxs = st?.wordTokenIndices || [];
  const builtSet = new Set(wordIdxs.slice(0, builtCount));

  for (let i = 0; i < tokens.length; i++){
    const t = tokens[i];

    if (t.type === TokenType.SPACE || t.type === TokenType.PUNCT || t.type === TokenType.OTHER){
      p.appendChild(document.createTextNode(t.text));
      continue;
    }

    if (builtSet.has(i)){
      p.appendChild(document.createTextNode(t.text));
    } else {
      break;
    }
  }

  if (!st?.done && builtCount > 0){
    p.appendChild(document.createTextNode(" …"));
  }

  if (!builtCount){
    p.innerHTML = `
      Build the verse one word at a time.<br>
      <span style="font-weight:600;">Tap the first word to start.</span>
    `;
  }

  return p;
}

function scrambleMakeChoices(wordTokenIndices, correctTokenIndex){
  const correctWord = tokens[correctTokenIndex].text;

  const verseWordsLower = wordTokenIndices
    .map(idx => tokens[idx].text.toLowerCase());

  const pool = VERSE_CHAIN_DECOY_WORDS
    .filter(word => word.toLowerCase() !== correctWord.toLowerCase())
    .filter((word, i, arr) => arr.indexOf(word) === i)
    .filter(word => !verseWordsLower.includes(word.toLowerCase()));

  shuffleArray(pool);

  const choices = [correctWord, ...pool.slice(0, 2)];
  shuffleArray(choices);
  return choices;
}

function scrambleMakeBookChoices(correctBook){
  const choices = [
    correctBook,
    ...chainPickRandomItems(BIBLE_BOOKS, 2, [correctBook])
  ];
  return shuffleArray(choices);
}

function scrambleMakeReferenceChoices(correctChapter, correctVerse){
  const correctRef = `${correctChapter}:${correctVerse}`;
  const refs = new Set([correctRef]);

  let tries = 0;
  while (refs.size < 3 && tries < 200){
    const chapterBump = Math.floor(Math.random() * 11) - 5;
    const verseBump = Math.floor(Math.random() * 21) - 10;

    let fakeChapter = correctChapter + chapterBump;
    let fakeVerse = correctVerse + verseBump;

    if (fakeChapter < 1) fakeChapter = 1 + Math.floor(Math.random() * 5);
    if (fakeVerse < 1) fakeVerse = 1 + Math.floor(Math.random() * 10);

    refs.add(`${fakeChapter}:${fakeVerse}`);
    tries += 1;
  }

  return shuffleArray(Array.from(refs));
}

function scrambleNextChoices(){
  const st = State.scrambleGame;
  if (!st) return;

  if (st.phase === "words"){
    const correctTokenIndex = st.wordTokenIndices[st.builtCount];
    if (!Number.isFinite(correctTokenIndex)) return;
    st.choices = scrambleMakeChoices(st.wordTokenIndices, correctTokenIndex);
    return;
  }

  if (st.phase === "book"){
    st.choices = scrambleMakeBookChoices(st.targetBook);
    return;
  }

  if (st.phase === "ref"){
    st.choices = scrambleMakeReferenceChoices(st.targetChapter, st.targetVerse);
    return;
  }

  st.choices = [];
}

  measurer.style.position = "absolute";
  measurer.style.visibility = "hidden";
  measurer.style.pointerEvents = "none";
  measurer.style.left = "-9999px";

    btn.textContent = text;
    measurer.appendChild(btn);

    const size = {
      actualW: Math.ceil(btn.offsetWidth),

    };

  function overlaps(a, b){
    return !(
      a.x + a.w + gap <= b.x ||
      b.x + b.w + gap <= a.x ||
      a.y + a.h + gap <= b.y ||
      b.y + b.h + gap <= a.y

    if (max <= min) return min;
    return min + Math.random() * (max - min);

      xMin: Math.round(x1 * fieldW),
      xMax: Math.round(x2 * fieldW),
      yMin: Math.round(y1 * fieldH),

    };
  }

  const layouts = [

    [
      makeZone(0.44, 0.64, 0.03, 0.11),
      makeZone(0.12, 0.32, 0.45, 0.55),
      makeZone(0.52, 0.72, 0.87, 0.95)
    ],

    // SET 3
    [
      makeZone(0.18, 0.38, 0.01, 0.09),
      makeZone(0.54, 0.74, 0.43, 0.53),
      makeZone(0.34, 0.54, 0.89, 0.97)
    ],

    // SET 4
    [
      makeZone(0.50, 0.70, 0.02, 0.10),
      makeZone(0.28, 0.48, 0.46, 0.56),
      makeZone(0.08, 0.28, 0.86, 0.94)
    ],

    // SET 5
    [
      makeZone(0.24, 0.44, 0.03, 0.11),
      makeZone(0.46, 0.66, 0.44, 0.54),
      makeZone(0.56, 0.76, 0.88, 0.96)
    ]

  ];

  let layoutIndex = Math.floor(Math.random() * layouts.length);
  if (layouts.length > 1 && st?.lastLayoutIndex === layoutIndex){
    layoutIndex = (layoutIndex + 1 + Math.floor(Math.random() * (layouts.length - 1))) % layouts.length;
  }
  if (st) st.lastLayoutIndex = layoutIndex;

  const chosenLayout = layouts[layoutIndex];
  const sizes = choices.map((choice, i) => measureChoice(choice, i));

  // Shared safe horizontal width for the round
  const sharedW = Math.max(...sizes.map(s => s.actualW)) + 8;

  const positions = [];
  const placed = [];

  for (let i = 0; i < sizes.length; i++){
    const size = sizes[i];
    const placeW = sharedW;
    const actualW = size.actualW;
    const zone = chosenLayout[i] || chosenLayout[0];

    const centerX = (fieldW - actualW) / 2;

    const maxShiftByWidth = actualW * horizontalShiftFactor;
    const maxShiftByEdges = Math.max(0, centerX - sidePad);
    const allowedShift = Math.max(0, Math.min(maxShiftByWidth, maxShiftByEdges));

    const minX = Math.max(sidePad, centerX - allowedShift);
    const maxX = Math.min(fieldW - actualW - sidePad, centerX + allowedShift);

    const minY = Math.max(padY, zone.yMin);
    const maxY = Math.max(minY, Math.min(zone.yMax - size.h, fieldH - size.h - padY));

    let placedRect = null;

    for (let attempt = 0; attempt < 120; attempt++){
      const rect = {
        x: randBetween(minX, maxX),
        y: randBetween(minY, maxY),
        w: placeW,
        h: size.h
      };

      const hit = placed.some(p => overlaps(rect, p));
      if (!hit){
        placedRect = rect;
        break;
      }
    }

    if (!placedRect){
      const fallbackRect = {
        x: minX,
        y: minY,
        w: placeW,
        h: size.h
      };

      const hit = placed.some(p => overlaps(fallbackRect, p));
      if (!hit){
        placedRect = fallbackRect;
      }
    }

    if (!placedRect){
      for (let attempt = 0; attempt < 140; attempt++){
        const rect = {
          x: randBetween(minX, maxX),
          y: randBetween(padY, Math.max(padY, fieldH - size.h - padY)),
          w: placeW,
          h: size.h
        };

        const hit = placed.some(p => overlaps(rect, p));
        if (!hit){
          placedRect = rect;
          break;
        }
      }
    }

    if (!placedRect){
        placedRect = {
          x: centerX,
          y: padY + (i * (size.h + gap)),
          w: placeW,
          h: size.h
        };
    }

    const rotationDeg = Math.round((Math.random() * 20) - 10);

    placed.push(placedRect);
    positions.push({
      leftPx: Math.round(placedRect.x),
      topPx: Math.round(placedRect.y),
      rotationDeg
    });
  }

  measurer.remove();
  return positions;
}

function bouncingBurstAt(fieldEl, x, y){
  const canvas = document.createElement("canvas");
  canvas.className = "bounce-burst";
  canvas.style.left = "0";
  canvas.style.top = "0";

  const width = Math.max(1, Math.floor(fieldEl.clientWidth));
  const height = Math.max(1, Math.floor(fieldEl.clientHeight));

  canvas.style.width = `${width}px`;
  canvas.style.height = `${height}px`;

  fieldEl.appendChild(canvas);

  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;

  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  x = Math.max(0, Math.min(width, x));
  y = Math.max(0, Math.min(height, y));

  const colors = ["#ffd54f", "#ff8a65", "#81c784", "#64b5f6", "#ffffff"];
  const particles = [];

  for (let i = 0; i < 24; i++){
    const angle = (Math.PI * 2 * i) / 24;
    const speed = 1.8 + Math.random() * 2.8;
    const life = 22 + Math.random() * 10;

    particles.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life,
      maxLife: life,
      size: 2 + Math.random() * 3,
      color: colors[i % colors.length]
    });
  }

  function tick(){
    ctx.clearRect(0, 0, width, height);

    let alive = 0;

    for (const p of particles){
      if (p.life <= 0) continue;

      alive += 1;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.life -= 1;

      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }

    ctx.globalAlpha = 1;

    if (alive > 0){
      requestAnimationFrame(tick);
    } else {
      canvas.remove();
    }
  }

  requestAnimationFrame(tick);
}

function scrambleChoose(choice, btnEl, fieldEl){
  const st = State.scrambleGame;
  if (!st || st.done) return;

  let correctChoice = "";

  if (st.phase === "words"){
    const correctTokenIndex = st.wordTokenIndices[st.builtCount];
    if (!Number.isFinite(correctTokenIndex)) return;
    correctChoice = tokens[correctTokenIndex].text;
  } else if (st.phase === "book"){
    correctChoice = st.targetBook;
  } else if (st.phase === "ref"){
    correctChoice = `${st.targetChapter}:${st.targetVerse}`;
  } else {
    return;
  }

  const rectField = fieldEl.getBoundingClientRect();
  const rectBtn = btnEl.getBoundingClientRect();
  const popX = rectBtn.left - rectField.left + (rectBtn.width / 2);
  const popY = rectBtn.top - rectField.top - 6;

  if (choice !== correctChoice){
    st.score -= 25;
    st.wrongGuesses += 1;
    st.wrongChoice = choice;
    scrambleShowPopup(fieldEl, popX, popY, "-25", false);
    render();

    setTimeout(() => {
      if (State.scrambleGame && State.scrambleGame.wrongChoice === choice){
        State.scrambleGame.wrongChoice = null;
        render();
      }
    }, 350);

    return;
  }

  st.score += 100;
  st.wrongChoice = null;
  scrambleShowPopup(fieldEl, popX, popY, "+100", true);

  if (st.phase === "words"){
    st.builtCount += 1;

    if (st.builtCount >= st.wordTokenIndices.length){
      st.phase = "book";
      setTimeout(() => {
        scrambleRoundRefresh();
        render();
      }, 180);
      return;
    }

    setTimeout(() => {
      scrambleRoundRefresh();
      render();
    }, 180);
    return;
  }

  if (st.phase === "book"){
    st.phase = "ref";
    setTimeout(() => {
      scrambleRoundRefresh();
      render();
    }, 180);
    return;
  }

  if (st.phase === "ref"){
    st.phase = "done";
    st.done = true;
    st.showRef = true;
    st.endedAt = performance.now();
    st.choices = [];
    st.positions = [];
    render();
  }
}

/* Slide navigation */
function screenToIndex(screen){
  // order matters for sliding
  const order = [
    Screen.INTRO,
    Screen.TITLE,
    Screen.LISTEN,
    Screen.ECHO,
    Screen.HIDE,
    Screen.FINAL_RECALL,
    Screen.CELEBRATION,
    Screen.PRACTICE,
    Screen.GAME
  ];
  return order.indexOf(screen);
}

function go(nextScreen){
  const from = State.screen;
  if (from === nextScreen) return;

  const fromIdx = screenToIndex(from);
  const toIdx = screenToIndex(nextScreen);

  if (State.isSliding) return;
  State.isSliding = true;

  // stop audio when leaving a screen
  try { audioEl.pause(); audioEl.currentTime = 0; } catch(e){}

  // Auto-shuffle when entering the missing-words section (no user button)
  if (nextScreen === Screen.HIDE && from !== Screen.HIDE) {
    reshuffleHidePlan();
    State.hideCount = 0;
    State.revealedTokenIdx = new Set();
  }

  // Track the exact screens involved in this transition
  State.transitionFromIdx = fromIdx;
  State.transitionToIdx = toIdx;

  // Keep the old screen centered first
  State.slideX = fromIdx;

  // Update to the new logical screen, but don't jump visually yet
  State.screen = nextScreen;
  render();

  // On the next frame, slide to the new screen
  requestAnimationFrame(() => {
    State.slideX = toIdx;
    updateSlideTransforms();

    setTimeout(() => {
      State.isSliding = false;
      State.transitionFromIdx = null;
      State.transitionToIdx = null;
      render();
    }, 340);
  });
}


/* If you jump directly (no transition), call this */
function setScreen(screen){
  State.screen = screen;
  State.slideX = screenToIndex(screen);
  render();
}

function updateSlideTransforms(){
  const slides = document.querySelectorAll(".slide");
  slides.forEach(slide => {
    const idx = Number(slide.dataset.idx || 0);
    const dx = (idx - State.slideX) * 100;
    slide.style.transform = `translateX(${dx}%)`;
  });
}

/* Build verse display with hidden items */
function underscoresForWord(word){
  if (!word) return "";
  const first = word[0];
  const restLen = Math.max(0, word.length - 1);
  return first + "_".repeat(restLen);
}

function isTokenHidden(tokenIdx){
  if (State.revealedTokenIdx.has(tokenIdx)) return false;
  // hidden if it's in first hideCount items of the mixed plan
  for (let i = 0; i < Math.min(State.hideCount, planMixed.length); i++){
    if (planMixed[i].tokenIndex === tokenIdx) return true;
  }
  return false;
}

function hideInfoForToken(tokenIdx){
  for (let i = 0; i < Math.min(State.hideCount, planMixed.length); i++){
    const item = planMixed[i];
    if (item.tokenIndex === tokenIdx) return item;
  }
  return null;
}



function verseNode(){
  const p = document.createElement("p");
  p.className = "verse";
  for (let i = 0; i < tokens.length; i++){
    const t = tokens[i];
    if (t.type === TokenType.SPACE){
      p.appendChild(document.createTextNode(t.text));
      continue;
    }
    if (!isTokenHidden(i)){
      if (State.revealedTokenIdx.has(i)){
        const span = document.createElement("span");
        span.className = "revealed-word";
        span.textContent = t.text;
        p.appendChild(span);
      } else {
        p.appendChild(document.createTextNode(t.text));
      }
      continue;
    }
    const info = hideInfoForToken(i);
    const span = document.createElement("span");
    span.className = "hintable no-zoom " + (info?.type === "emoji" ? "emoji" : "underscore");
    span.textContent = info?.type === "emoji"
      ? (info.emoji || "❓")
      : underscoresForWord(t.text);

    span.onclick = () => {

      // mark revealed in state
      State.revealedTokenIdx.add(i);

      // create yellow revealed word element
      const revealed = document.createElement("span");
      revealed.className = "revealed-word";
      revealed.textContent = t.text;

      // replace the blank directly without re-rendering the screen
      span.replaceWith(revealed);

    };
      

    p.appendChild(span);
  }
  return p;
}

function finalRecallNode(){
  const p = document.createElement("p");
  p.className = "verse";

  for (let i = 0; i < tokens.length; i++){
    const t = tokens[i];

    if (t.type === TokenType.SPACE){
      p.appendChild(document.createTextNode(t.text));
      continue;
    }

    if (t.type === TokenType.WORD){
      const span = document.createElement("span");
      span.className = "hintable no-zoom underscore";
      span.textContent = underscoresForWord(t.text);
      p.appendChild(span);
      continue;
    }

    p.appendChild(document.createTextNode(t.text));
  }

  return p;
}

function waitForDuration(timeoutMs = 2000){
  return new Promise((resolve) => {
    // If duration is already known, resolve immediately
    if (isFinite(audioEl.duration) && audioEl.duration > 0) return resolve(audioEl.duration);

    const t0 = Date.now();

    const done = () => {
      audioEl.removeEventListener("loadedmetadata", done);
      audioEl.removeEventListener("durationchange", done);
      const d = (isFinite(audioEl.duration) && audioEl.duration > 0) ? audioEl.duration : NaN;
      resolve(d);
    };

    audioEl.addEventListener("loadedmetadata", done);
    audioEl.addEventListener("durationchange", done);

    // Fallback: don’t hang forever
    const timer = setInterval(() => {
      if (isFinite(audioEl.duration) && audioEl.duration > 0){
        clearInterval(timer);
        done();
      } else if (Date.now() - t0 > timeoutMs){
        clearInterval(timer);
        done();
      }
    }, 50);
  });
}

}

function getFinalRecallPct(){

  const elapsed = performance.now() - State.finalRecallStartedAt;
  return Math.max(0, 1 - elapsed / State.finalRecallDurationMs);
}


let echoCancelToken = 0;
async function runEchoSequence(){
  const my = ++echoCancelToken;
  State.echoDone = false;
  State.echoSpeaking = false;
  State.echoIndex = 0;
  render();

  for (let i = 0; i < ECHO_PARTS.length; i++){
    if (my !== echoCancelToken) return;

    const file = echoPartFileByIndex(i);
    setAudioSrc(file);
    audioEl.currentTime = 0;

State.echoIndex = i;
render();

    try{
      await safePlay();
    }catch(e){
      showDialog({
        title: "Echo audio missing",
        body: `Couldn't play: ${file}`,
        actions: [dlgBtn("OK", {onClick: closeDialog})]
      });
      return;
    }

    await new Promise((resolve) => {
      const onEnd = () => { audioEl.removeEventListener("ended", onEnd); resolve(); };
      audioEl.addEventListener("ended", onEnd);
    });

    State.echoSpeaking = true;
    render();

    // Give the child time to repeat: duration × 1.25 (fallback 2s if unknown)
    const d = await waitForDuration();
    const repeatMs = (isFinite(d) && d > 0) ? (d * 1.25 * 1000) : 2000;
    await new Promise(r => setTimeout(r, repeatMs));

    State.echoSpeaking = false;
    render();
  }

  // restore main verse audio for later
  setAudioSrc(AUDIO_FILE);
  State.echoDone = true;
  render();
}

function startFireworks(canvas){
  stopFireworks();

  const ctx = canvas.getContext("2d");
  const particles = [];

  function resize(){
    canvas.width = canvas.clientWidth * window.devicePixelRatio;
    canvas.height = canvas.clientHeight * window.devicePixelRatio;
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  }

  resize();
  window.addEventListener("resize", resize);

  function burst(){
    const x = Math.random() * canvas.clientWidth;
    const y = 80 + Math.random() * (canvas.clientHeight * 0.45);

    for (let i = 0; i < 28; i++){
      const angle = (Math.PI * 2 * i) / 28;
      const speed = 2 + Math.random() * 3.5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 40 + Math.random() * 20,
        size: 2 + Math.random() * 3
      });
    }
  }

  burst();
  State.fireworksTimer = setInterval(burst, 1400);

  function tick(){
    ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

    for (let i = particles.length - 1; i >= 0; i--){
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.life -= 1;

      if (p.life <= 0){
        particles.splice(i, 1);
        continue;
      }

      ctx.globalAlpha = Math.max(0, p.life / 60);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = ["#ffd54f", "#ff8a65", "#81c784", "#64b5f6", "#ffffff"][i % 5];
      ctx.fill();
    }

    ctx.globalAlpha = 1;

    if (State.screen === Screen.CELEBRATION){
      requestAnimationFrame(tick);
    }
  }

  requestAnimationFrame(tick);
}

function chainWordTokenIndices(){
  const out = [];
  for (let i = 0; i < tokens.length; i++){
    if (tokens[i].type === TokenType.WORD){
      out.push(i);
    }
  }
  return out;
}

function chainBuiltVerseNode(){
  const p = document.createElement("p");
  p.className = "verse";

  const st = State.chainGame;
  const builtCount = st?.builtCount || 0;
  const wordIdxs = st?.wordTokenIndices || [];

  const builtSet = new Set(wordIdxs.slice(0, builtCount));

  for (let i = 0; i < tokens.length; i++){
    const t = tokens[i];

    if (t.type === TokenType.SPACE || t.type === TokenType.PUNCT || t.type === TokenType.OTHER){
      p.appendChild(document.createTextNode(t.text));
      continue;
    }

    if (builtSet.has(i)){
      p.appendChild(document.createTextNode(t.text));
    } else {
      break;
    }
  }

  if (!st?.done && builtCount > 0){
    p.appendChild(document.createTextNode(" …"));
  }

  if (!builtCount){
    p.innerHTML = `
      Build the verse one word at a time.<br>
      <span style="font-weight:600;">Tap the first word to start.</span>
    `;
  }

  return p;
}

function chainMakeChoices(wordTokenIndices, correctTokenIndex){
  const correctWord = tokens[correctTokenIndex].text;

  const verseWordsLower = wordTokenIndices
    .map(idx => tokens[idx].text.toLowerCase());

  const pool = VERSE_CHAIN_DECOY_WORDS
    .filter(word => word.toLowerCase() !== correctWord.toLowerCase())
    .filter((word, i, arr) => arr.indexOf(word) === i)
    .filter(word => !verseWordsLower.includes(word.toLowerCase()));

  shuffleArray(pool);

  const choices = [correctWord, ...pool.slice(0, 3)];
  return shuffleArray(choices);
}


function startVerseChainGame(){
  const wordTokenIndices = chainWordTokenIndices();

  const meta = chainVerseMetaFromId(VERSE_ID);

  State.chainGame = {
    wordTokenIndices,
    builtCount: 0,
    choices: [],
    choiceIndex: 0,
    done: false,
    wrongChoice: null,
    phase: "words",
    showRef: false,
    targetBook: meta.book,
    targetChapter: meta.chapter,
    targetVerse: meta.verse,
  };

  const firstTokenIndex = wordTokenIndices[0];
  if (Number.isFinite(firstTokenIndex)){
    State.chainGame.choices = chainMakeChoices(wordTokenIndices, firstTokenIndex);
    chainSetRandomChoiceIndex();
  }
}

function chainPrevChoice(){
  const st = State.chainGame;
  if (!st || st.done || !st.choices.length) return;
  st.choiceIndex = (st.choiceIndex - 1 + st.choices.length) % st.choices.length;
  render();
}

function chainNextChoice(){
  const st = State.chainGame;
  if (!st || st.done || !st.choices.length) return;
  st.choiceIndex = (st.choiceIndex + 1) % st.choices.length;
  render();
}

function chainCurrentChoice(){
  const st = State.chainGame;
  if (!st || !st.choices.length) return "";
  return st.choices[st.choiceIndex];
}

function chainChoose(word){
  const st = State.chainGame;
  if (!st || st.done) return;

  if (st.phase === "words"){
    const correctTokenIndex = st.wordTokenIndices[st.builtCount];
    if (!Number.isFinite(correctTokenIndex)) return;

    const correctWord = tokens[correctTokenIndex].text;

    if (word === correctWord){
      st.builtCount += 1;
      st.wrongChoice = null;

      if (st.builtCount >= st.wordTokenIndices.length){
        st.phase = "book";
        st.choices = chainMakeBookChoices(st.targetBook);
        chainSetRandomChoiceIndex();
        render();
        return;
      }

      const nextTokenIndex = st.wordTokenIndices[st.builtCount];
      st.choices = chainMakeChoices(st.wordTokenIndices, nextTokenIndex);
      chainSetRandomChoiceIndex();
      render();
      return;
    }

    st.wrongChoice = word;
    render();

    setTimeout(() => {
      if (State.chainGame && State.chainGame.wrongChoice === word){
        State.chainGame.wrongChoice = null;
        render();
      }
    }, 350);

    return;
  }

  if (st.phase === "book"){
    if (word === st.targetBook){
      st.phase = "ref";
      st.wrongChoice = null;
      st.choices = chainMakeReferenceChoices(st.targetChapter, st.targetVerse);
      chainSetRandomChoiceIndex();
      render();
      return;
    }

    st.wrongChoice = word;
    render();

    setTimeout(() => {
      if (State.chainGame && State.chainGame.wrongChoice === word){
        State.chainGame.wrongChoice = null;
        render();
      }
    }, 350);

    return;
  }

  if (st.phase === "ref"){
    const correctRef = `${st.targetChapter}:${st.targetVerse}`;

    if (word === correctRef){
      st.phase = "done";
      st.done = true;
      st.showRef = true;
      st.wrongChoice = null;
      st.choices = [];
      render();
      return;
    }

    st.wrongChoice = word;
    render();

    setTimeout(() => {
      if (State.chainGame && State.chainGame.wrongChoice === word){
        State.chainGame.wrongChoice = null;
        render();
      }
    }, 350);

    return;
  }
}

function bouncingRandomPositions(choices, fieldEl){
  const st = State.bouncingGame;
  const pad = 16;
  const gap = 14;

  const fieldRect = fieldEl?.getBoundingClientRect();
  const fieldW = Math.max(260, Math.floor(fieldRect?.width || 320));
  const fieldH = Math.max(240, Math.floor(fieldRect?.height || 240));

  const measurer = document.createElement("div");
  measurer.style.position = "absolute";
  measurer.style.visibility = "hidden";
  measurer.style.pointerEvents = "none";
  measurer.style.left = "-9999px";
  measurer.style.top = "-9999px";
  document.body.appendChild(measurer);

  function measureChoice(text){
    const btn = document.createElement("button");
    btn.className = "scramble-word";
    btn.style.position = "absolute";
    btn.style.left = "0";
    btn.style.top = "0";
    btn.style.maxWidth = `${Math.max(120, fieldW - (pad * 2))}px`;
    btn.textContent = text;
    measurer.appendChild(btn);

    const rect = btn.getBoundingClientRect();
    const size = {
      w: Math.ceil(rect.width),
      h: Math.ceil(rect.height)
    };

    btn.remove();
    return size;
  }

  function overlaps(a, b){
    return !(
      a.x + a.w + gap <= b.x ||
      b.x + b.w + gap <= a.x ||
      a.y + a.h + gap <= b.y ||
      b.y + b.h + gap <= a.y
    );
  }

  function randBetween(min, max){
    if (max <= min) return min;
    return min + Math.random() * (max - min);
  }

  function makeZone(x1, x2, y1, y2){
    return {
      xMin: Math.round(x1 * fieldW),
      xMax: Math.round(x2 * fieldW),
      yMin: Math.round(y1 * fieldH),
      yMax: Math.round(y2 * fieldH)
    };
  }

  const layouts = [
    [
      makeZone(0.10, 0.30, 0.02, 0.10),
      makeZone(0.42, 0.62, 0.44, 0.54),
      makeZone(0.18, 0.38, 0.88, 0.96)
    ],
    [
      makeZone(0.44, 0.64, 0.03, 0.11),
      makeZone(0.12, 0.32, 0.45, 0.55),
      makeZone(0.52, 0.72, 0.87, 0.95)
    ],
    [
      makeZone(0.18, 0.38, 0.01, 0.09),
      makeZone(0.54, 0.74, 0.43, 0.53),
      makeZone(0.34, 0.54, 0.89, 0.97)
    ],
    [
      makeZone(0.50, 0.70, 0.02, 0.10),
      makeZone(0.28, 0.48, 0.46, 0.56),
      makeZone(0.08, 0.28, 0.86, 0.94)
    ],
    [
      makeZone(0.24, 0.44, 0.03, 0.11),
      makeZone(0.46, 0.66, 0.44, 0.54),
      makeZone(0.56, 0.76, 0.88, 0.96)
    ]
  ];

  let layoutIndex = Math.floor(Math.random() * layouts.length);
  if (layouts.length > 1 && st?.lastLayoutIndex === layoutIndex){
    layoutIndex = (layoutIndex + 1 + Math.floor(Math.random() * (layouts.length - 1))) % layouts.length;
  }
  if (st) st.lastLayoutIndex = layoutIndex;

  const chosenLayout = layouts[layoutIndex];
  const sizes = choices.map(measureChoice);
  const positions = [];
  const placed = [];

  for (let i = 0; i < sizes.length; i++){
    const size = sizes[i];
    const zone = chosenLayout[i] || chosenLayout[0];

    const minX = Math.max(pad, zone.xMin);
    const maxX = Math.max(minX, Math.min(zone.xMax - size.w, fieldW - size.w - pad));
    const minY = Math.max(pad, zone.yMin);
    const maxY = Math.max(minY, Math.min(zone.yMax - size.h, fieldH - size.h - pad));

    let placedRect = null;

    for (let attempt = 0; attempt < 120; attempt++){
      const rect = {
        x: randBetween(minX, maxX),
        y: randBetween(minY, maxY),
        w: size.w,
        h: size.h
      };

      const hit = placed.some(p => overlaps(rect, p));
      if (!hit){
        placedRect = rect;
        break;
      }
    }

    if (!placedRect){
      const fallbackRect = {
        x: minX,
        y: minY,
        w: size.w,
        h: size.h
      };

      const hit = placed.some(p => overlaps(fallbackRect, p));
      if (!hit){
        placedRect = fallbackRect;
      }
    }

    if (!placedRect){
      for (let attempt = 0; attempt < 140; attempt++){
        const rect = {
          x: randBetween(pad, Math.max(pad, fieldW - size.w - pad)),
          y: randBetween(pad, Math.max(pad, fieldH - size.h - pad)),
          w: size.w,
          h: size.h
        };

        const hit = placed.some(p => overlaps(rect, p));
        if (!hit){
          placedRect = rect;
          break;
        }
      }
    }

    if (!placedRect){
      placedRect = {
        x: pad,
        y: pad + (i * (size.h + gap)),
        w: size.w,
        h: size.h
      };
    }

    const rotationDeg = 0;

    placed.push(placedRect);
    positions.push({
      leftPx: Math.round(placedRect.x),
      topPx: Math.round(placedRect.y),
      rotationDeg
    });
  }

  measurer.remove();
  return positions;
}

function bouncingRandomVelocity(){
  const mag = 1.2 + (Math.random() * 1.0);
  return Math.random() < 0.5 ? -mag : mag;
}

function bouncingBuildMovers(fieldEl, btnRefs){
  const st = State.bouncingGame;
  if (!st) return [];

  const rectField = fieldEl.getBoundingClientRect();
  const fieldW = Math.floor(rectField.width || 320);
  const fieldH = Math.floor(rectField.height || 240);

  return btnRefs.map((btn, i) => {
    const pos = st.positions[i] || { leftPx: 20, topPx: 20, rotationDeg: 0 };
    let vx = bouncingRandomVelocity();
    let vy = bouncingRandomVelocity();

    if (Math.abs(vx) < 1.1) vx = vx < 0 ? -1.1 : 1.1;
    if (Math.abs(vy) < 1.1) vy = vy < 0 ? -1.1 : 1.1;

    return {
      btn,
      x: pos.leftPx,
      y: pos.topPx,
      vx,
      vy,
      w: Math.ceil(btn.offsetWidth),
      h: Math.ceil(btn.offsetHeight),
      fieldW,
      fieldH
    };
  });
}

function bouncingStopMotion(){
  const st = State.bouncingGame;
  if (!st) return;

  if (st.rafId){
    cancelAnimationFrame(st.rafId);
    st.rafId = 0;
  }

  st.fieldEl = null;
  st.btnRefs = null;
  st.movers = null;
}

function bouncingStartMotion(fieldEl, btnRefs){
  const st = State.bouncingGame;
  if (!st || st.done) return;

  bouncingStopMotion();

  st.fieldEl = fieldEl;
  st.btnRefs = btnRefs;
  st.movers = bouncingBuildMovers(fieldEl, btnRefs);

  function tick(){
    const live = State.bouncingGame;
    if (!live || live !== st) return;
    if (State.screen !== Screen.GAME || State.activeGame !== "bouncing") return;
    if (st.done) return;
    if (!st.movers || !st.movers.length) return;

    const padX = 0;
    const padY = 16;

    for (const m of st.movers){
      const fieldW = fieldEl.clientWidth;
      const fieldH = fieldEl.clientHeight;

      const minX = padX;
      const maxX = Math.max(minX, fieldW - m.w - padX);
      const minY = padY;
      const maxY = Math.max(minY, fieldH - m.h - padY);

      m.x += m.vx;
      m.y += m.vy;

      if (m.x <= minX){
        m.x = minX;
        m.vx *= -1;
      }
      if (m.x >= maxX){
        m.x = maxX;
        m.vx *= -1;
      }
      if (m.y <= minY){
        m.y = minY;
        m.vy *= -1;
      }
      if (m.y >= maxY){
        m.y = maxY;
        m.vy *= -1;
      }

      m.btn.style.left = `${Math.round(m.x)}px`;
      m.btn.style.top = `${Math.round(m.y)}px`;
    }

    bouncingRefreshDebugOverlay(fieldEl);

    st.rafId = requestAnimationFrame(tick);
  }

  st.rafId = requestAnimationFrame(tick);
}

function bouncingChoose(choice, btnEl, fieldEl){
  const st = State.bouncingGame;
  if (!st || st.done) return;

  let correctChoice = "";

  if (st.phase === "words"){
    const correctTokenIndex = st.wordTokenIndices[st.builtCount];
    if (!Number.isFinite(correctTokenIndex)) return;
    correctChoice = tokens[correctTokenIndex].text;
  } else if (st.phase === "book"){
    correctChoice = st.targetBook;
  } else if (st.phase === "ref"){
    correctChoice = `${st.targetChapter}:${st.targetVerse}`;
  } else {
    return;
  }

  const rectField = fieldEl.getBoundingClientRect();
  const rectBtn = btnEl.getBoundingClientRect();
  const popX = rectBtn.left - rectField.left + (rectBtn.width / 2);
  const popY = rectBtn.top - rectField.top - 6;

  if (choice !== correctChoice){
    st.score -= 25;
    st.wrongGuesses += 1;
    st.wrongChoice = choice;
    scrambleShowPopup(fieldEl, popX, popY, "-25", false);

    btnEl.classList.add("wrong");

    setTimeout(() => {
      btnEl.classList.remove("wrong");

      if (State.bouncingGame && State.bouncingGame.wrongChoice === choice){
        State.bouncingGame.wrongChoice = null;
      }
    }, 350);

    return;
  }

  st.score += 100;
  st.wrongChoice = null;
  scrambleShowPopup(fieldEl, popX, popY, "+100", true);

  const hitMover = st.movers?.find(m => m.btn === btnEl);
  if (hitMover){
    hitMover.btn.style.pointerEvents = "none";
    hitMover.btn.style.visibility = "hidden";
    hitMover.vx = 0;
    hitMover.vy = 0;
  }

  bouncingAnimateCorrectChoice(btnEl, fieldEl, () => {
    bouncingStopMotion();

    const live = State.bouncingGame;
    if (!live || live !== st) return;

    if (st.phase === "words"){
      st.builtCount += 1;

      if (st.builtCount >= st.wordTokenIndices.length){
        st.phase = "book";
        bouncingRoundRefresh();
        render();
        return;
      }

      bouncingRoundRefresh();
      render();
      return;
    }

    if (st.phase === "book"){
      st.phase = "ref";
      bouncingRoundRefresh();
      render();
      return;
    }

    if (st.phase === "ref"){
      st.phase = "done";
      st.done = true;
      st.showRef = true;
      st.endedAt = performance.now();
      st.choices = [];
      st.positions = [];
      render();
    }
  });
  
}

const TRAFFIC_EMOJIS = ["🚗","🚕","🚙","🛻","🚓","🚘","🚖"];
const TRAFFIC_GREEN = "#a7cb6f";

function trafficElapsedMs(){

function trafficBuiltVerseNode(){
  const p = document.createElement("p");
  p.className = "verse scramble-verse";

  const st = State.trafficGame;
  const builtCount = st?.builtCount || 0;
  const wordIdxs = st?.wordTokenIndices || [];
  const builtSet = new Set(wordIdxs.slice(0, builtCount));

  for (let i = 0; i < tokens.length; i++){
    const t = tokens[i];

    if (t.type === TokenType.SPACE || t.type === TokenType.PUNCT || t.type === TokenType.OTHER){
      p.appendChild(document.createTextNode(t.text));
      continue;
    }

    if (builtSet.has(i)){
      p.appendChild(document.createTextNode(t.text));
    } else {
      break;
    }
  }

  if (!st?.done && builtCount > 0){
    p.appendChild(document.createTextNode(" …"));
  }

  if (!builtCount){
    p.innerHTML = `
      Build the verse one word at a time.<br>
      <span style="font-weight:600;">Tap the first word to start.</span>
    `;
  }

  return p;
}

function trafficUniqueDecoys(pool, correct, count){
  const excluded = new Set([String(correct).toLowerCase()]);
  const out = [];

  for (const item of shuffleArray([...pool])){
    const key = String(item).toLowerCase();
    if (excluded.has(key)) continue;
    if (out.some(x => String(x).toLowerCase() === key)) continue;
    out.push(item);
    if (out.length >= count) break;
  }

  return out;
}

function trafficMakeRefDecoys(correctRef){
  const [chapterText, verseText] = String(correctRef).split(":");
  const chapter = Number(chapterText || 1);
  const verse = Number(verseText || 1);

  const refs = new Set();
  let tries = 0;

  while (refs.size < 8 && tries < 200){
    const chapterBump = Math.floor(Math.random() * 9) - 4;
    const verseBump = Math.floor(Math.random() * 19) - 9;

    let fakeChapter = chapter + chapterBump;
    let fakeVerse = verse + verseBump;

    if (fakeChapter < 1) fakeChapter = 1 + Math.floor(Math.random() * 6);
    if (fakeVerse < 1) fakeVerse = 1 + Math.floor(Math.random() * 20);

    const candidate = `${fakeChapter}:${fakeVerse}`;
    if (candidate !== correctRef){
      refs.add(candidate);
    }

    tries += 1;
  }

  return Array.from(refs);
}

function trafficCurrentCorrectLabel(st){
  if (!st) return "";

  if (st.phase === "words"){
    const correctTokenIndex = st.wordTokenIndices[st.builtCount];
    if (!Number.isFinite(correctTokenIndex)) return "";
    return tokens[correctTokenIndex].text;
  }

  if (st.phase === "book"){
    return st.targetBook;
  }

  if (st.phase === "ref"){
    return `${st.targetChapter}:${st.targetVerse}`;
  }

  return "";
}

function trafficPhaseDecoyPool(st){
  if (!st) return [];

  if (st.phase === "words"){
    const verseWordsLower = st.wordTokenIndices
      .map(idx => tokens[idx].text.toLowerCase());

    return VERSE_CHAIN_DECOY_WORDS
      .filter(word => !verseWordsLower.includes(word.toLowerCase()));
  }

  if (st.phase === "book"){
    return BIBLE_BOOKS;
  }

  if (st.phase === "ref"){
    const correctRef = `${st.targetChapter}:${st.targetVerse}`;
    return trafficMakeRefDecoys(correctRef);
  }

  return [];
}

function trafficStartPhase(st, phase){
  st.phase = phase;
  st.items = [];
  st.spawnSerial = 0;
  st.lastSpawnAt = 0;
  st.nextSpawnDelay = trafficRandomSpawnDelay();
  st.lastCorrectSpawnAt = 0;
}

function trafficRandomSpawnDelay(){
  return 850 + Math.random() * 650;
}

function trafficChooseRoad(st){
  const topCount = st.items.filter(x => x.road === 0).length;
  const bottomCount = st.items.filter(x => x.road === 1).length;

  if (topCount < bottomCount) return 0;
  if (bottomCount < topCount) return 1;
  return Math.random() < 0.5 ? 0 : 1;
}

function trafficCanSpawnCorrect(st){
  if (!st || st.done) return false;
  if (st.totalSpawned < 2) return false;
  if (st.items.some(x => x.isCorrect)) return false;
  return true;
}

function trafficShouldSpawnCorrect(st, now){
  if (!trafficCanSpawnCorrect(st)) return false;

  const timeSinceCorrect = now - (st.lastCorrectSpawnAt || st.startedAt || now);
  if (timeSinceCorrect > 4200) return true;

  return Math.random() < 0.38;
}

function trafficSpawnItem(fieldEl){
  const st = State.trafficGame;
  if (!st || st.done || !fieldEl) return;

  const now = performance.now();
  const fieldW = Math.max(320, fieldEl.clientWidth);

  const correctLabel = trafficCurrentCorrectLabel(st);
  if (!correctLabel) return;

  const isCorrect = trafficShouldSpawnCorrect(st, now);
  const pool = trafficPhaseDecoyPool(st);

  let label = correctLabel;
  if (!isCorrect){
    const decoys = trafficUniqueDecoys(pool, correctLabel, 1);
    label = decoys[0] || "apple";
  }

  const road = trafficChooseRoad(st);
  const emoji = TRAFFIC_EMOJIS[Math.floor(Math.random() * TRAFFIC_EMOJIS.length)];
  const direction = road === 0 ? -1 : 1;
  const x = direction < 0 ? fieldW + 130 : -130;
  const speed = 58 + Math.random() * 18;

  const item = {
    id: st.nextItemId++,
    road,
    direction,
    emoji,
    label,
    isCorrect,
    x,
    speed,
    width: 150,
    destroy: false,
    spawnedAt: now
  };

  st.items.push(item);
  st.totalSpawned += 1;
  st.spawnSerial += 1;

  if (isCorrect){
    st.lastCorrectSpawnAt = now;
  }
}

function trafficRoadMetrics(fieldEl){
  const fieldW = Math.max(320, fieldEl.clientWidth);
  const fieldH = Math.max(260, fieldEl.clientHeight);

  const roadH = fieldH * 0.40;
  const gapH = fieldH * 0.20;

  const topRoadTop = 0;
  const bottomRoadTop = roadH + gapH;

  return {
    fieldW,
    fieldH,
    roadH,
    gapH,
    topRoadTop,
    bottomRoadTop,
    lane1CenterY: roadH * 0.25,
    lane2CenterY: roadH * 0.75
  };
}

function trafficRemoveOffscreen(fieldEl){
  const st = State.trafficGame;
  if (!st || !fieldEl) return;

  const fieldW = Math.max(320, fieldEl.clientWidth);

  st.items = st.items.filter(item => {
    if (item.destroy) return false;
    if (item.direction < 0 && item.x < -220) return false;
    if (item.direction > 0 && item.x > fieldW + 220) return false;
    return true;
  });
}

function trafficSpawnTick(fieldEl, now){
  const st = State.trafficGame;
  if (!st || st.done) return;

  if (!st.lastSpawnAt){
    st.lastSpawnAt = now;
    st.nextSpawnDelay = trafficRandomSpawnDelay();
    return;
  }

  const timeSinceSpawn = now - st.lastSpawnAt;
  if (timeSinceSpawn < st.nextSpawnDelay) return;

  st.lastSpawnAt = now;
  st.nextSpawnDelay = trafficRandomSpawnDelay();

  const roadCounts = [
    st.items.filter(x => x.road === 0).length,
    st.items.filter(x => x.road === 1).length
  ];

  if (roadCounts[0] >= 4 && roadCounts[1] >= 4) return;

  trafficSpawnItem(fieldEl);
  trafficRenderItems(fieldEl);
}

function trafficFlashWrong(itemId){
  const st = State.trafficGame;
  if (!st || !st.fieldEl) return;

  const itemEl = st.fieldEl.querySelector(`[data-traffic-id="${itemId}"]`);
  if (!itemEl) return;

  const carBtn = itemEl.querySelector(".traffic-car-btn");
  const wordBtn = itemEl.querySelector(".traffic-word-btn");

  if (carBtn) carBtn.classList.add("wrong");
  if (wordBtn) wordBtn.classList.add("wrong");

  setTimeout(() => {
    if (carBtn) carBtn.classList.remove("wrong");
    if (wordBtn) wordBtn.classList.remove("wrong");
  }, 280);
}

function trafficChoose(itemId, tappedEl){
  const st = State.trafficGame;
  if (!st || st.done) return;

  const item = st.items.find(x => x.id === itemId);
  if (!item) return;

  const fieldEl = st.fieldEl;
  if (!fieldEl) return;

  const rectField = fieldEl.getBoundingClientRect();
  const rectBtn = tappedEl.getBoundingClientRect();
  const popX = rectBtn.left - rectField.left + (rectBtn.width / 2);
  const popY = rectBtn.top - rectField.top - 6;

  if (!item.isCorrect){
    trafficFlashWrong(item.id);
    scrambleShowPopup(fieldEl, popX, popY, "✖", false);
    return;
  }

  item.destroy = true;
  scrambleShowPopup(fieldEl, popX, popY, "✔", true);

  if (st.phase === "words"){
    st.builtCount += 1;

    if (st.builtCount >= st.wordTokenIndices.length){
      trafficStartPhase(st, "book");
      render();
      return;
    }

    render();
    return;
  }

  if (st.phase === "book"){
    trafficStartPhase(st, "ref");
    render();
    return;
  }

  if (st.phase === "ref"){
    st.phase = "done";
    st.done = true;
    st.showRef = true;
    st.endedAt = performance.now();
    st.items = [];
    render();
  }
}

  const st = State.trafficGame;
  if (!st) return;

  if (st.rafId){
    cancelAnimationFrame(st.rafId);
    st.rafId = 0;
  }

  st.fieldEl = null;
  st.slideEl = null;

function trafficUpdateSlideBg(slideEl){

  slideEl.style.background = TRAFFIC_GREEN;
}

function trafficRenderItems(fieldEl){
  const st = State.trafficGame;
  if (!st || !fieldEl) return;

  const metrics = trafficRoadMetrics(fieldEl);

  const topRoad = fieldEl.querySelector(".traffic-road.top");
  const bottomRoad = fieldEl.querySelector(".traffic-road.bottom");

  if (topRoad){
    topRoad.style.top = `${metrics.topRoadTop}px`;
    topRoad.style.height = `${metrics.roadH}px`;
  }

  if (bottomRoad){
    bottomRoad.style.top = `${metrics.bottomRoadTop}px`;
    bottomRoad.style.height = `${metrics.roadH}px`;
  }

  for (const item of st.items){
    let itemEl = fieldEl.querySelector(`[data-traffic-id="${item.id}"]`);

    if (!itemEl){
      itemEl = document.createElement("div");
      itemEl.className = "traffic-item";
      itemEl.dataset.trafficId = String(item.id);

      const carBtn = document.createElement("button");
      carBtn.className = "traffic-car-btn no-zoom";
      carBtn.type = "button";
      carBtn.textContent = item.emoji;
      carBtn.onclick = () => trafficChoose(item.id, carBtn);

      const wordBtn = document.createElement("button");
      wordBtn.className = "traffic-word-btn no-zoom";
      wordBtn.type = "button";
      wordBtn.textContent = item.label;
      wordBtn.onclick = () => trafficChoose(item.id, wordBtn);

      itemEl.appendChild(carBtn);
      itemEl.appendChild(wordBtn);
      fieldEl.appendChild(itemEl);

      requestAnimationFrame(() => {
        const w = Math.ceil(itemEl.offsetWidth || 150);
        item.width = Math.max(110, w);
      });
    }

    const roadTop = item.road === 0 ? metrics.topRoadTop : metrics.bottomRoadTop;
    const itemLeft = item.x;

    itemEl.style.transform = `translate(${itemLeft}px, ${roadTop}px)`;

    const carBtn = itemEl.querySelector(".traffic-car-btn");
    const wordBtn = itemEl.querySelector(".traffic-word-btn");

    if (carBtn){
      carBtn.style.top = `${metrics.lane1CenterY}px`;
      carBtn.style.transform = `translateX(-50%) translateY(-50%)`;
      if (item.direction > 0){
        carBtn.style.scale = "-1 1";
      } else {
        carBtn.style.scale = "1 1";
      }
    }

    if (wordBtn){
      wordBtn.style.top = `${metrics.lane2CenterY}px`;
      wordBtn.style.transform = `translateX(-50%) translateY(-50%)`;
      wordBtn.textContent = item.label;
    }
  }

  fieldEl.querySelectorAll(".traffic-item").forEach(el => {
    const id = Number(el.dataset.trafficId || 0);
    const found = st.items.some(item => item.id === id);
    if (!found) el.remove();
  });
}

function trafficStartMotion(fieldEl){
  const st = State.trafficGame;
  if (!st || st.done) return;

  trafficStopMotion();
  st.fieldEl = fieldEl;

  let lastTs = performance.now();

  function tick(ts){
    const live = State.trafficGame;
    if (!live || live !== st) return;
    if (State.screen !== Screen.GAME || State.activeGame !== "traffic") return;
    if (st.done) return;
    if (!st.fieldEl) return;

    const dt = Math.min(40, ts - lastTs);
    lastTs = ts;

    trafficSpawnTick(fieldEl, ts);

    for (const item of st.items){
      item.x += item.direction * item.speed * (dt / 1000);
    }

    trafficRemoveOffscreen(fieldEl);
    trafficRenderItems(fieldEl);

    st.rafId = requestAnimationFrame(tick);
  }

  st.rafId = requestAnimationFrame(tick);
}

registerGame({
  id: "traffic",
  title: "Traffic Tap",
  description: "Tap the moving correct word.",
  start(stage){
    if (!State.trafficGame){
      startTrafficTapGame();
    }

    const st = State.trafficGame;

registerGame({
  id: "bouncing",
  title: "Bouncing Words",
  description: "Tap the correct moving word.",
  start(stage){
    if (!State.bouncingGame){
      startBouncingWordsGame();
    }

    const st = State.bouncingGame;
    bouncingStopMotion();
    stage.innerHTML = "";

    const verseBox = document.createElement("div");
    verseBox.style.width = "100%";
    verseBox.style.maxWidth = "760px";
    verseBox.style.minHeight = "90px";
    verseBox.style.display = "flex";
    verseBox.style.alignItems = "center";
    verseBox.style.justifyContent = "center";
    verseBox.style.textAlign = "center";
    verseBox.appendChild(bouncingBuiltVerseNode());
    stage.appendChild(verseBox);

    const gameLayout = stage.closest(".learn-layout");
    const coachTitle = gameLayout?.querySelector("#gameCoachTitle");
    const coachActions = gameLayout?.querySelector("#gameCoachActions");

    if (coachTitle) coachTitle.textContent = "";

    if (!coachActions) return;
    coachActions.innerHTML = "";

    if (st.done){
      const doneMsg = document.createElement("div");
      doneMsg.className = "small";
      doneMsg.style.fontWeight = "900";
      doneMsg.style.textAlign = "center";
      doneMsg.style.maxWidth = "520px";
      doneMsg.innerHTML = `
        Score: ${st.score}<br>
        Incorrect guesses: ${st.wrongGuesses}<br>
        Total time: ${scrambleFormatTime(bouncingElapsedMs())}
      `;
      coachActions.appendChild(doneMsg);
      return;
    }

    const field = document.createElement("div");
    field.className = "scramble-field";

    if (!st.positions.length || st.positions.length !== st.choices.length){
      st.positions = bouncingRandomPositions(st.choices, field);
    }

    const btnRefs = [];
    const colorSet = bouncingColorSet();
    

    st.choices.forEach((choice, i) => {
        const btn = document.createElement("button");
        btn.className = "scramble-word no-zoom";
        if (st.wrongChoice === choice) btn.classList.add("wrong");
        btn.type = "button";
        btn.textContent = choice;
        btn.classList.add("spawn-in");
        btn.classList.add(colorSet[i]);


      const pos = st.positions[i] || { leftPx: 20, topPx: 20, rotationDeg: 0 };
      btn.style.left = `${pos.leftPx}px`;
      btn.style.top = `${pos.topPx}px`;
      btn.style.setProperty("--rot", `${pos.rotationDeg || 0}deg`);

      btn.onclick = (e) => {
        e.stopPropagation();
        bouncingChoose(choice, btn, field);
      };

      btnRefs.push(btn);
      field.appendChild(btn);
    });

    coachActions.appendChild(field);
        bouncingDebugOverlay(field, btnRefs);

    if (!st.done){
      requestAnimationFrame(() => {
        bouncingStartMotion(field, btnRefs);
      });
    }
  }
});

function screenHide(idx){
  const inner = document.createElement("div");
  inner.style.display = "flex";
  inner.style.flexDirection = "column";
  inner.style.height = "100%";

  const hiddenNow = Math.min(State.hideCount, planMixed.length);
  const done = hiddenNow >= planMixed.length;

  inner.innerHTML = `
    <div class="learn-layout">
      <div class="learn-ref">
        <div class="verse-ref-pill">${VERSE_REF}</div>
      </div>

      <div class="learn-verse">
        <div id="verseStage"></div>
      </div>

      <div class="learn-coach">
        <div>
          <div class="coach-title">Guess the Missing Words</div>

          ${
            State.sayVerseActive
              ? `<div class="timer-wrap"><div class="timer-bar" id="sayVerseBar"></div></div>`
              : `<div class="coach-text">Tap a missing part of the verse to reveal the word.</div>`
          }
        </div>

        <div class="coach-actions">
          <button
            class="carousel-main no-zoom"
            id="btnRemoveWord"
            style="max-width:520px; ${
              State.sayVerseActive ? "background:#3fa66b;color:white;box-shadow:none;" : ""
            }"
            ${State.sayVerseActive ? "disabled" : ""}
          >
            ${State.sayVerseActive ? "Say the Verse" : "Remove a word"}
          </button>
        </div>
      </div>
    </div>
  `;



  inner.querySelector("#verseStage").appendChild(verseNode());

  const btnRemove = inner.querySelector("#btnRemoveWord");
  if (btnRemove){
      btnRemove.onclick = async () => {

        if (State.hideCount >= planMixed.length){
          go(Screen.FINAL_RECALL);
          return;
        }

        State.hideCount = Math.min(planMixed.length, State.hideCount + 1);
        State.revealedTokenIdx = new Set();

        // Activate Say-the-Verse phase
        State.sayVerseActive = true;
        render();

        // Wait for audio duration
        setAudioSrc(AUDIO_FILE);
        const d = await waitForDuration();
        const durationMs = (isFinite(d) && d > 0) ? d * 1000 : 5000;

        State.sayVerseStartedAt = performance.now();
        State.sayVerseDurationMs = durationMs;

        const animate = () => {
          const pct = getSayVersePct();
          const currentBar = document.getElementById("sayVerseBar");

          if (currentBar){
            currentBar.style.width = (pct * 100) + "%";
          }

          if (pct > 0 && State.sayVerseActive){
            requestAnimationFrame(animate);
          }
        };

        requestAnimationFrame(animate);

        await new Promise(r => setTimeout(r, durationMs));

        State.sayVerseActive = false;
        State.sayVerseStartedAt = 0;
        State.sayVerseDurationMs = 0;

        if (State.hideCount >= planMixed.length){
          State.finalRecallActive = true;
          State.finalRecallDone = false;

          go(Screen.FINAL_RECALL);

          setAudioSrc(AUDIO_FILE);
          const d2 = await waitForDuration();
          const finalDurationMs = (isFinite(d2) && d2 > 0) ? d2 * 1000 : 5000;

          State.finalRecallStartedAt = performance.now();
          State.finalRecallDurationMs = finalDurationMs;
          render();

          await new Promise(r => setTimeout(r, finalDurationMs));

          State.finalRecallActive = false;
          State.finalRecallStartedAt = 0;
          State.finalRecallDurationMs = 0;
          State.finalRecallDone = true;
          render();
          return;
        }

        render();
      };
  }

  return makeSlide({idx, bg:"var(--purple)", navHidden:false, inner});
}

/* Render */
function render(){
  app.innerHTML = "";

  const currentIdx = screenToIndex(State.screen);

  let indicesToRender;
  if (State.isSliding) {
    indicesToRender = [State.transitionFromIdx, State.transitionToIdx];
  } else {
    indicesToRender = [currentIdx];
  }

  const uniq = Array.from(new Set(indicesToRender.filter(i => i !== null && i >= 0)));
  for (const idx of uniq){
    const screen = ["intro","title","listen","echo","hide","final_recall","celebration","practice","game"][idx];
    let slide = null;
    if (screen === Screen.INTRO) slide = screenIntro(idx);
    if (screen === Screen.TITLE) slide = screenTitle(idx);
    if (screen === Screen.LISTEN) slide = screenListen(idx);
    if (screen === Screen.ECHO) slide = screenEcho(idx);
    if (screen === Screen.HIDE) slide = screenHide(idx);
    if (screen === Screen.FINAL_RECALL) slide = screenFinalRecall(idx);
    if (screen === Screen.CELEBRATION) slide = screenCelebration(idx);
    if (screen === Screen.PRACTICE) slide = screenPractice(idx);
    if (screen === Screen.GAME) slide = screenGame(idx);
    if (slide) app.appendChild(slide);
  }

  // Ensure transform matches current slideX
  if (!State.isSliding) {
    State.slideX = currentIdx;
  }
  updateSlideTransforms();

  renderNav();
}
