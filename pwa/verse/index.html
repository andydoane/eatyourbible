<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Verse Memory</title>

  <!-- Font (same family as your other apps) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --navH: 70px;
      --safeB: env(safe-area-inset-bottom);
      --safeT: env(safe-area-inset-top);
      --tap: 44px;

      --purple: #7f66c6;
      --dark: rgba(0,0,0,0.30);
    }

    *, *::before, *::after{ box-sizing: border-box; }

    html, body{
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: "Baloo 2", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg, var(--purple));
      color: #fff;
    }

    #app{
      position: fixed;
      inset: 0;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---------- Slide System (Creed/Commandments style) ---------- */
    .slide{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      min-height:0;
      padding-bottom: calc(var(--navH) + var(--safeB));
      transition: transform 320ms ease;
      will-change: transform;
      background: var(--bg, var(--purple));
    }
    .slide.nav-hidden{
      padding-bottom: 0;
    }

    .top{
      padding: calc(14px + var(--safeT)) 18px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height: 60px;
    }
    .titles{
      display:flex;
      flex-direction:column;
      line-height:1.05;
      min-width:0;
    }
    .titles .title{
      font-size: 20px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .titles .subtitle{
      font-size: 14px;
      opacity: 0.92;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content{
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding: 8px 18px 18px;
      gap: 14px;
      text-align:center;
    }

    /* ---------- Bottom nav (Creed/Commandments style) ---------- */
    nav#navBar{
      height: var(--navH);
      background: var(--dark);
      display:none;
      justify-content:space-between;
      align-items:center;
      color:white;
      position:fixed;
      left:0; right:0; bottom:0;
      z-index: 9999;
      padding: 0 22px calc(var(--safeB)) 22px;
      box-sizing:border-box;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .nav-btn{
      width: var(--tap);
      height: var(--tap);
      border:none;
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.95);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .nav-btn:active{ transform: scale(0.98); }
    .nav-center{
      font-weight: 900;
      font-size: 16px;
      opacity: 0.98;
      letter-spacing: 0.3px;
    }

    .nav-icon{ width:34px; height:34px; display:block; }

    /* ---------- Quiz-style intro ---------- */
    .quiz-intro{
      background: var(--purple);
      color: #fff;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100%;
      text-align:center;
      gap: 16px;
      padding: 24px 18px;
    }
    .quiz-intro img{
      width: min(70vw, 420px);
      max-height: 45vh;
      object-fit: contain;
      animation: introWiggle 1s infinite alternate;
      user-select:none;
    }
    @keyframes introWiggle { 0%{ transform: rotate(-4deg);} 100%{ transform: rotate(4deg);} }
    .presented{ font-size: 16px; font-weight: 800; opacity: 0.95; }
    .site{ font-size: 28px; font-weight: 900; letter-spacing: 0.5px; }
    .hint{ font-size: 13px; opacity: 0.85; }

    /* ---------- Title screen (Creed/Commandments style) ---------- */
    .title-screen{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      height:100%;
      padding: 24px 16px;
      padding-bottom: 110px;
      background: var(--purple);
      color: white;
      text-align:center;
    }
    .title-content{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      width:100%;
      max-width: 700px;
    }
    .title-screen h2{
      font-size: clamp(22px, 5.2vw, 44px);
      font-weight: 800;
      margin: 14px 0 12px;
      text-wrap: balance;
    }
    .title-screen img{
      width: min(80%, 420px);
      max-height: 34vh;
      object-fit: contain;
    }

    .title-carousel{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      width:100%;
      margin-top: 8px;
    }
    .carousel-arrow{
      width: 54px;
      height: 54px;
      padding: 0;
      margin: 10px 0;
      border-radius: 999px;
      background: rgba(0,0,0,0.30);
      color: white;
      border: none;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height: 0;
      cursor:pointer;
    }
    .carousel-main{
      margin: 10px 0;
      flex: 1;
      min-width: 0;
      max-width: 420px;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 900;
      border-radius: 999px;
      border: none;
      background: white;
      color: var(--purple);
      box-shadow: 0 6px 0 rgba(0,0,0,0.25);
      cursor:pointer;
    }
    .carousel-main:active{
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    }
    .carousel-dots{
      display:flex;
      justify-content:center;
      gap: 10px;
      margin-top: 6px;
    }
    .carousel-dot{
      width: 10px; height: 10px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.75);
      opacity: 0.9;
    }
    .carousel-dot.active{ background: rgba(255,255,255,0.95); }

    /* ---------- Verse text ---------- */
    .verse-ref-pill{
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.2px;
      background: rgba(255,255,255,0.95);
      color: #111;
      text-shadow: none;
      padding: 8px 16px;
      border-radius: 999px;
      display:inline-block;
    }
    .verse{
      font-size: clamp(24px, 6.2vw, 52px);
      font-weight: 900;
      line-height: 1.25;
      text-wrap: balance;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
      overflow-wrap: anywhere;
      margin: 0;
    }

    .small{
      font-size: 16px;
      opacity: 0.92;
      line-height: 1.35;
      text-wrap: balance;
    }

/* ---------- Learn (3-zone) layout ---------- */
.learn-layout{
  height: 100%;
  display: flex;
  flex-direction: column;

  /* top padding + side padding */
  padding: calc(14px + var(--safeT)) 18px 18px;

  /* padding between zones */
  gap: 12px;
}

/* Zone 1: reference pill band (target ~10%) */
.learn-ref{
  flex: 0 0 10%;
  min-height: 56px;
  max-height: 96px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Zone 2: verse text band (target ~50%) */
.learn-verse{
  flex: 1 1 50%;
  min-height: 0;               /* important for flex scrolling */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 6px;
  overflow: auto;              /* only scrolls if verse is too long */
   text-align: center; 
   background: rgba(0,0,0,0.40);
border-radius: 18px;
}

.learn-verse.echo-green{
  background: #3fa66b;
}

/* Zone 3: coach panel band (target ~40%) */
.learn-coach{
  flex: 0 0 40%;
  min-height: 180px;           /* keeps room for button + text on small phones */
  width: 100%;
   background: transparent; 
  color: #fff; 
  border-radius: 18px;
  border: none; 
  padding: 16px 16px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center; 
  align-items: center; 
  gap: 10px;
  box-shadow: none; 
}

.coach-title{
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0.2px;
  text-align: center;
text-transform: uppercase;
letter-spacing: 1px;
}

.coach-text{
  font-size: 15px;
  font-weight: 700;
  opacity: 0.92;
  line-height: 1.25;
  text-align: center;
text-wrap: balance;
}

.coach-status{
  font-size: 14px;
  font-weight: 800;
  opacity: 0.90;
}

.coach-actions{
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
  width: 100%;
  max-width: 520px;
}

.learn-coach .carousel-main{
  flex: 0 0 auto;     /* 🚫 do NOT grow vertically */
  width: 100%;
  max-width: 520px;
}

    /* tappable blanks */
    .hintable{
      display:inline;
      padding: 0 .18em;
      margin: 0 .03em;
      border-radius: .45em;
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.14);
      color: #fff;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .hintable:active{ transform: scale(.99); }
    .hintable.emoji{ background: rgba(0,0,0,0.30); }
    .hintable.underscore{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    .revealed-word{
      color: #ffd54f;
    }

    /* simple progress bar (quiz-esque) */
    .timer-wrap{
      width:100%;
      max-width: 720px;
      height: 12px;
      border-radius: 99px;
      background: rgba(255,255,255,0.18);
      overflow:hidden;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.25);
    }
    .timer-bar{
      height:100%;
      width:0%;
      transform-origin: left center;
      background: rgba(255,255,255,0.92);
      transition: width 120ms linear;
    }

    /* ---------- Overlay modal ---------- */
    .overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,0.85);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      z-index: 20000;
      opacity: 0;
      transition: opacity 220ms ease;
    }
    .overlay.show{
      display:flex;
      opacity: 1;
    }
    .dialog{
      width: min(520px, 100%);
      border-radius: 22px;
      background: rgba(20,20,20,0.92);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      padding: 18px;
      text-align:left;
    }
    .dialog h3{ margin:0 0 8px; font-size:20px; font-weight:900; }
    .dialog p{ margin:0 0 14px; opacity:0.92; line-height:1.35; }
    .dialog .row{ display:flex; gap: 12px; }
    .dlg-btn{
      flex: 1;
      height: 50px;
      border:none;
      border-radius: 16px;
      font-family:inherit;
      font-weight: 900;
      font-size: 18px;
      cursor:pointer;
      background: rgba(255,255,255,0.92);
      color:#111;
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
    }
    .dlg-btn.secondary{
      background: transparent;
      color: rgba(255,255,255,0.95);
      border:2px solid rgba(255,255,255,0.55);
      box-shadow:none;
    }

    /* prevent iOS double-tap zoom on controls */
    .no-zoom{
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

.celebration-screen{
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 24px 18px 110px;
  text-align: center;
  overflow: hidden;
}

.celebration-screen h2{
  font-size: clamp(28px, 7vw, 52px);
  font-weight: 900;
  margin: 0 0 16px;
  text-wrap: balance;
  position: relative;
  z-index: 2;
}

.celebration-actions{
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: min(420px, 100%);
  position: relative;
  z-index: 2;
}

#fireworksCanvas{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

  </style>
</head>

/* =========================================================

const SVG_BACK = `

/* =========================================================
   Minimal Verse Engine (Learn flow)
   - Loads old JSON unchanged
   - Uses old audio naming scheme
   - Implements: Listen -> Echo -> Hide words
   ========================================================= */
const app = document.getElementById("app");
const navBar = document.getElementById("navBar");

// overlay
const overlay = document.getElementById("overlay");
const dlgTitle = document.getElementById("dlgTitle");
const dlgBody = document.getElementById("dlgBody");
const dlgActions = document.getElementById("dlgActions");

function showDialog({title="Notice", body="", actions=[]}){
  dlgTitle.textContent = title;
  dlgBody.textContent = body;
  dlgActions.innerHTML = "";
  for (const a of actions) dlgActions.appendChild(a);
  overlay.classList.add("show");
}
function closeDialog(){ overlay.classList.remove("show"); }
overlay.addEventListener("click", (e)=>{ if (e.target === overlay) closeDialog(); });

function dlgBtn(label, {secondary=false, onClick}={}){
  const b = document.createElement("button");
  b.className = "dlg-btn" + (secondary ? " secondary" : "");
  b.type = "button";
  b.textContent = label;
  b.onclick = onClick || (()=>{});
  return b;
}

function getVerseIdFromUrl(){
  const params = new URLSearchParams(window.location.search);
  return params.get("v") || "john_3_16";
}

/* Audio */
const audioEl = new Audio();
audioEl.preload = "auto";

let muted = false;
function applyMute(){
  audioEl.muted = muted;
}
function toggleMute(){
  muted = !muted;
  applyMute();
  // stop current audio immediately
  try { audioEl.pause(); } catch(e){}
  try { audioEl.currentTime = 0; } catch(e){}
  renderNav(); // update icon
}

function safePlay() {
  applyMute();
  return audioEl.play().catch((err) => {
    showDialog({
      title: "Audio can’t play yet",
      body: "Your browser blocked playback. Tap play again (or make sure the mp3 exists).",
      actions: [dlgBtn("OK", {onClick: closeDialog})]
    });
    throw err;
  });
}

function setAudioSrc(src){
  audioEl.src = src;
  try { audioEl.load(); } catch(e){}
}

/* JSON-configured verse */
let cfg = null;
let VERSE_ID = null;
let VERSE_TEXT = "";
let ECHO_PARTS = [];
let HIDE_PLAN = [];
let TRANSLATION = "";
let ATTRIBUTION = "";
let VERSE_REF = "";
let AUDIO_FILE = "";

// tokenization (copied conceptually from old engine)
const TokenType = { SPACE:"space", WORD:"word", PUNCT:"punct", OTHER:"other" };
function tokenize(text){
  const re = /(\s+|[A-Za-z]+(?:'[A-Za-z]+)?|[0-9]+|[^\sA-Za-z0-9]+)/g;
  const raw = text.match(re) || [];
  return raw.map(t => {
    if (/^\s+$/.test(t)) return { type: TokenType.SPACE, text: t };
    if (/^[A-Za-z]+(?:'[A-Za-z]+)?$/.test(t)) return { type: TokenType.WORD, text: t };
    if (/^[0-9]+$/.test(t)) return { type: TokenType.WORD, text: t };
    if (/^[^\sA-Za-z0-9]+$/.test(t)) return { type: TokenType.PUNCT, text: t };
    return { type: TokenType.OTHER, text: t };
  });
}

let tokens = [];
let planResolved = [];
let planMixed = [];
function shuffleArray(arr){
  for (let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function resolveHidePlanToTokenIndices(tokens, plan){
  const wordPositionsByLower = new Map();
  tokens.forEach((tok, idx) => {
    if (tok.type !== TokenType.WORD) return;
    const key = tok.text.toLowerCase();
    if (!wordPositionsByLower.has(key)) wordPositionsByLower.set(key, []);
    wordPositionsByLower.get(key).push(idx);
  });

  return plan.map((item) => {
    const key = String(item.word).toLowerCase();
    const list = wordPositionsByLower.get(key) || [];
    const occ = item.occurrence ?? 1;
    const tokenIndex = list[occ - 1];
    return { ...item, tokenIndex };
  }).filter(x => Number.isFinite(x.tokenIndex));
}
function reshuffleHidePlan(){
  planMixed = shuffleArray([...planResolved]);
}

function verseIdToRef(verseId, translation){
  const parts = verseId.split("_");
  const book = parts[0][0].toUpperCase() + parts[0].slice(1);
  const chapter = parts[1];
  const verses = parts.slice(2);
  const versePart = verses.length === 1 ? verses[0] : `${verses[0]}–${verses[1]}`;
  const t = translation ? ` (${translation})` : "";
  return `${book} ${chapter}:${versePart}${t}`;
}

try {

  cfg = json;
  VERSE_ID = json.verseId;
  TRANSLATION = json.translation || "";
  ATTRIBUTION = json.attribution || "";
  VERSE_TEXT = json.verseText || "";
  ECHO_PARTS = Array.isArray(json.echoParts) ? json.echoParts : [];

}

/* Slide navigation */
function screenToIndex(screen){
  // order matters for sliding
  const order = [
    Screen.INTRO,
    Screen.TITLE,
    Screen.LISTEN,
    Screen.ECHO,
    Screen.HIDE,
    Screen.FINAL_RECALL,
    Screen.CELEBRATION,
    Screen.PRACTICE
  ];
  return order.indexOf(screen);
}

function go(nextScreen){
  const from = State.screen;
  if (from === nextScreen) return;

  const fromIdx = screenToIndex(from);
  const toIdx = screenToIndex(nextScreen);

  if (State.isSliding) return;
  State.isSliding = true;

  // stop audio when leaving a screen
  try { audioEl.pause(); audioEl.currentTime = 0; } catch(e){}

  // Auto-shuffle when entering the missing-words section (no user button)
  if (nextScreen === Screen.HIDE && from !== Screen.HIDE) {
    reshuffleHidePlan();
    State.hideCount = 0;
    State.revealedTokenIdx = new Set();
  }

  // Track the exact screens involved in this transition
  State.transitionFromIdx = fromIdx;
  State.transitionToIdx = toIdx;

  // Keep the old screen centered first
  State.slideX = fromIdx;

  // Update to the new logical screen, but don't jump visually yet
  State.screen = nextScreen;
  render();

  // On the next frame, slide to the new screen
  requestAnimationFrame(() => {
    State.slideX = toIdx;
    updateSlideTransforms();

    setTimeout(() => {
      State.isSliding = false;
      State.transitionFromIdx = null;
      State.transitionToIdx = null;
      render();
    }, 340);
  });
}


/* If you jump directly (no transition), call this */
function setScreen(screen){
  State.screen = screen;
  State.slideX = screenToIndex(screen);
  render();
}

function updateSlideTransforms(){
  const slides = document.querySelectorAll(".slide");
  slides.forEach(slide => {
    const idx = Number(slide.dataset.idx || 0);
    const dx = (idx - State.slideX) * 100;
    slide.style.transform = `translateX(${dx}%)`;
  });
}

/* Build verse display with hidden items */
function underscoresForWord(word){
  if (!word) return "";
  const first = word[0];
  const restLen = Math.max(0, word.length - 1);
  return first + "_".repeat(restLen);
}

function isTokenHidden(tokenIdx){
  if (State.revealedTokenIdx.has(tokenIdx)) return false;
  // hidden if it's in first hideCount items of the mixed plan
  for (let i = 0; i < Math.min(State.hideCount, planMixed.length); i++){
    if (planMixed[i].tokenIndex === tokenIdx) return true;
  }
  return false;
}
function hideInfoForToken(tokenIdx){
  for (let i = 0; i < Math.min(State.hideCount, planMixed.length); i++){
    const item = planMixed[i];
    if (item.tokenIndex === tokenIdx) return item;
  }
  return null;
}

function verseNode(){
  const p = document.createElement("p");
  p.className = "verse";
  for (let i = 0; i < tokens.length; i++){
    const t = tokens[i];
    if (t.type === TokenType.SPACE){
      p.appendChild(document.createTextNode(t.text));
      continue;
    }
    if (!isTokenHidden(i)){
      if (State.revealedTokenIdx.has(i)){
        const span = document.createElement("span");
        span.className = "revealed-word";
        span.textContent = t.text;
        p.appendChild(span);
      } else {
        p.appendChild(document.createTextNode(t.text));
      }
      continue;
    }
    const info = hideInfoForToken(i);
    const span = document.createElement("span");
    span.className = "hintable no-zoom " + (info?.type === "emoji" ? "emoji" : "underscore");
    span.textContent = info?.type === "emoji"
      ? (info.emoji || "❓")
      : underscoresForWord(t.text);

    span.onclick = () => {

      // mark revealed in state
      State.revealedTokenIdx.add(i);

      // create yellow revealed word element
      const revealed = document.createElement("span");
      revealed.className = "revealed-word";
      revealed.textContent = t.text;

      // replace the blank directly without re-rendering the screen
      span.replaceWith(revealed);

    };
      

    p.appendChild(span);
  }
  return p;
}

function finalRecallNode(){
  const p = document.createElement("p");
  p.className = "verse";

  for (let i = 0; i < tokens.length; i++){
    const t = tokens[i];

    if (t.type === TokenType.SPACE){
      p.appendChild(document.createTextNode(t.text));
      continue;
    }

    if (t.type === TokenType.WORD){
      const span = document.createElement("span");
      span.className = "hintable no-zoom underscore";
      span.textContent = underscoresForWord(t.text);
      p.appendChild(span);
      continue;
    }

    p.appendChild(document.createTextNode(t.text));
  }

  return p;
}

function waitForDuration(timeoutMs = 2000){
  return new Promise((resolve) => {
    // If duration is already known, resolve immediately
    if (isFinite(audioEl.duration) && audioEl.duration > 0) return resolve(audioEl.duration);

    const t0 = Date.now();

    const done = () => {
      audioEl.removeEventListener("loadedmetadata", done);
      audioEl.removeEventListener("durationchange", done);
      const d = (isFinite(audioEl.duration) && audioEl.duration > 0) ? audioEl.duration : NaN;
      resolve(d);
    };

    audioEl.addEventListener("loadedmetadata", done);
    audioEl.addEventListener("durationchange", done);

    // Fallback: don’t hang forever
    const timer = setInterval(() => {
      if (isFinite(audioEl.duration) && audioEl.duration > 0){
        clearInterval(timer);
        done();
      } else if (Date.now() - t0 > timeoutMs){
        clearInterval(timer);
        done();
      }
    }, 50);
  });
}

function getSayVersePct(){
  if (!State.sayVerseActive || !State.sayVerseDurationMs) return 1;

  const elapsed = performance.now() - State.sayVerseStartedAt;
  return Math.max(0, 1 - elapsed / State.sayVerseDurationMs);
}

function getFinalRecallPct(){
  if (!State.finalRecallActive || !State.finalRecallDurationMs) return 1;

  const elapsed = performance.now() - State.finalRecallStartedAt;
  return Math.max(0, 1 - elapsed / State.finalRecallDurationMs);
}


let echoCancelToken = 0;
async function runEchoSequence(){
  const my = ++echoCancelToken;
  State.echoDone = false;
  State.echoSpeaking = false;
  State.echoIndex = 0;
  render();

  for (let i = 0; i < ECHO_PARTS.length; i++){
    if (my !== echoCancelToken) return;

    const file = echoPartFileByIndex(i);
    setAudioSrc(file);
    audioEl.currentTime = 0;

State.echoIndex = i;
render();

    try{
      await safePlay();
    }catch(e){
      showDialog({
        title: "Echo audio missing",
        body: `Couldn't play: ${file}`,
        actions: [dlgBtn("OK", {onClick: closeDialog})]
      });
      return;
    }

    await new Promise((resolve) => {
      const onEnd = () => { audioEl.removeEventListener("ended", onEnd); resolve(); };
      audioEl.addEventListener("ended", onEnd);
    });

    State.echoSpeaking = true;
    render();

    // Give the child time to repeat: duration × 1.25 (fallback 2s if unknown)
    const d = await waitForDuration();
    const repeatMs = (isFinite(d) && d > 0) ? (d * 1.25 * 1000) : 2000;
    await new Promise(r => setTimeout(r, repeatMs));

    State.echoSpeaking = false;
    render();
  }

  // restore main verse audio for later
  setAudioSrc(AUDIO_FILE);
  State.echoDone = true;
  render();
}

function stopFireworks(){
  if (State.fireworksTimer){
    clearInterval(State.fireworksTimer);
    State.fireworksTimer = null;
  }
}

function startFireworks(canvas){
  stopFireworks();

  const ctx = canvas.getContext("2d");
  const particles = [];

  function resize(){
    canvas.width = canvas.clientWidth * window.devicePixelRatio;
    canvas.height = canvas.clientHeight * window.devicePixelRatio;
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  }

  resize();
  window.addEventListener("resize", resize);

  function burst(){
    const x = Math.random() * canvas.clientWidth;
    const y = 80 + Math.random() * (canvas.clientHeight * 0.45);

    for (let i = 0; i < 28; i++){
      const angle = (Math.PI * 2 * i) / 28;
      const speed = 2 + Math.random() * 3.5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 40 + Math.random() * 20,
        size: 2 + Math.random() * 3
      });
    }
  }

  burst();
  State.fireworksTimer = setInterval(burst, 1400);

  function tick(){
    ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

    for (let i = particles.length - 1; i >= 0; i--){
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.life -= 1;

      if (p.life <= 0){
        particles.splice(i, 1);
        continue;
      }

      ctx.globalAlpha = Math.max(0, p.life / 60);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = ["#ffd54f", "#ff8a65", "#81c784", "#64b5f6", "#ffffff"][i % 5];
      ctx.fill();
    }

    ctx.globalAlpha = 1;

    if (State.screen === Screen.CELEBRATION){
      requestAnimationFrame(tick);
    }
  }

  requestAnimationFrame(tick);
}

function renderNav(){
  // Always show nav except intro/title? Your other apps hide nav on intro.
  const show = (State.screen !== Screen.INTRO && State.screen !== Screen.CELEBRATION);
  navBar.style.display = show ? "flex" : "none";
  if (!show){
    navBar.innerHTML = "";

  }

  // Determine left/back and right/next behavior

  let right = null;

  const muteBtn = `

    </button>
  `;

    </button>
  `;

  const nextBtn = `

      ${SVG_FORWARD}
    </button>
  `;

  // left/back destinations
  if (State.screen === Screen.TITLE) left = ""; // no back from title (acts like home)
  else left = backBtn;

  // center label
  if (State.screen === Screen.TITLE) center = "HOME";
  if (State.screen === Screen.LISTEN) center = "LISTEN";
  if (State.screen === Screen.ECHO) center = "ECHO";
  if (State.screen === Screen.HIDE) center = "MEMORIZE";
  if (State.screen === Screen.FINAL_RECALL) center = "FINAL";
  if (State.screen === Screen.PRACTICE) center = "PRACTICE";

  // right/next destinations (gated where needed)
  right = nextBtn;

  navBar.innerHTML = `
    <div style="display:flex; gap:12px; align-items:center;">
      ${left || `<div style="width:var(--tap);height:var(--tap)"></div>`}
    </div>
    <div class="nav-center">${center}</div>
    <div style="display:flex; gap:12px; align-items:center;">
      ${muteBtn}
      ${right || `<div style="width:var(--tap);height:var(--tap)"></div>`}
    </div>
  `;

  // wire events
  const btnMute = document.getElementById("btnMute");
  if (btnMute) btnMute.onclick = toggleMute;

  const btnBack = document.getElementById("btnBack");
  if (btnBack){
    btnBack.onclick = () => {
        if (State.screen === Screen.LISTEN) go(Screen.TITLE);
        else if (State.screen === Screen.ECHO) go(Screen.LISTEN);
        else if (State.screen === Screen.HIDE) go(Screen.ECHO);
        else if (State.screen === Screen.FINAL_RECALL) go(Screen.HIDE);
        else if (State.screen === Screen.PRACTICE) go(Screen.TITLE);
        else go(Screen.TITLE);
    };
  }

  const btnNext = document.getElementById("btnNext");
  if (btnNext){
    const disabled =
      (State.screen === Screen.LISTEN && !State.listenDone) ||
      (State.screen === Screen.ECHO && !State.echoDone) ||
      (State.screen === Screen.FINAL_RECALL && !State.finalRecallDone);

    btnNext.style.opacity = disabled ? "0.45" : "1";
    btnNext.style.pointerEvents = disabled ? "none" : "auto";

    btnNext.onclick = () => {
      if (State.isSliding) return;

    if (State.screen === Screen.TITLE) go(Screen.LISTEN);
    else if (State.screen === Screen.LISTEN) go(Screen.ECHO);
    else if (State.screen === Screen.ECHO) go(Screen.HIDE);
    else if (State.screen === Screen.HIDE){
      if (State.hideCount >= planMixed.length){
        go(Screen.FINAL_RECALL);
      } else {
        State.hideCount = Math.min(planMixed.length, State.hideCount + 1);
        render();
      }
    }
    else if (State.screen === Screen.FINAL_RECALL) go(Screen.CELEBRATION);
    else if (State.screen === Screen.PRACTICE) go(Screen.TITLE);
    };
  }
}

`;

  inner.querySelector("#btnEcho").onclick = async () => {

    // If echo already completed, continue
    if (State.echoDone){
      go(Screen.HIDE);
      return;
    }

    // cancel any prior
    echoCancelToken++;
    try { audioEl.pause(); audioEl.currentTime = 0; } catch(e){}
    await runEchoSequence();
  };

  return makeSlide({idx, bg:"var(--purple)", navHidden:false, inner});
}

function screenHide(idx){
  const inner = document.createElement("div");
  inner.style.display = "flex";
  inner.style.flexDirection = "column";
  inner.style.height = "100%";

  const hiddenNow = Math.min(State.hideCount, planMixed.length);
  const done = hiddenNow >= planMixed.length;

  inner.innerHTML = `
    <div class="learn-layout">
      <div class="learn-ref">
        <div class="verse-ref-pill">${VERSE_REF}</div>
      </div>

      <div class="learn-verse">
        <div id="verseStage"></div>
      </div>

      <div class="learn-coach">
        <div>
          <div class="coach-title">Guess the Missing Words</div>

          ${
            State.sayVerseActive
              ? `<div class="timer-wrap"><div class="timer-bar" id="sayVerseBar"></div></div>`
              : `<div class="coach-text">Tap a missing part of the verse to reveal the word.</div>`
          }
        </div>

        <div class="coach-actions">
          <button
            class="carousel-main no-zoom"
            id="btnRemoveWord"
            style="max-width:520px; ${
              State.sayVerseActive ? "background:#3fa66b;color:white;box-shadow:none;" : ""
            }"
            ${State.sayVerseActive ? "disabled" : ""}
          >
            ${State.sayVerseActive ? "Say the Verse" : "Remove a word"}
          </button>
        </div>
      </div>
    </div>
  `;



  inner.querySelector("#verseStage").appendChild(verseNode());

  const btnRemove = inner.querySelector("#btnRemoveWord");
  if (btnRemove){
      btnRemove.onclick = async () => {

        if (State.hideCount >= planMixed.length){
          go(Screen.FINAL_RECALL);
          return;
        }

        State.hideCount = Math.min(planMixed.length, State.hideCount + 1);
        State.revealedTokenIdx = new Set();

        // Activate Say-the-Verse phase
        State.sayVerseActive = true;
        render();

        // Wait for audio duration
        setAudioSrc(AUDIO_FILE);
        const d = await waitForDuration();
        const durationMs = (isFinite(d) && d > 0) ? d * 1000 : 5000;

        State.sayVerseStartedAt = performance.now();
        State.sayVerseDurationMs = durationMs;

        const animate = () => {
          const pct = getSayVersePct();
          const currentBar = document.getElementById("sayVerseBar");

          if (currentBar){
            currentBar.style.width = (pct * 100) + "%";
          }

          if (pct > 0 && State.sayVerseActive){
            requestAnimationFrame(animate);
          }
        };

        requestAnimationFrame(animate);

        await new Promise(r => setTimeout(r, durationMs));

        State.sayVerseActive = false;
        State.sayVerseStartedAt = 0;
        State.sayVerseDurationMs = 0;

        if (State.hideCount >= planMixed.length){
          State.finalRecallActive = true;
          State.finalRecallDone = false;

          go(Screen.FINAL_RECALL);

          setAudioSrc(AUDIO_FILE);
          const d2 = await waitForDuration();
          const finalDurationMs = (isFinite(d2) && d2 > 0) ? d2 * 1000 : 5000;

          State.finalRecallStartedAt = performance.now();
          State.finalRecallDurationMs = finalDurationMs;
          render();

          await new Promise(r => setTimeout(r, finalDurationMs));

          State.finalRecallActive = false;
          State.finalRecallStartedAt = 0;
          State.finalRecallDurationMs = 0;
          State.finalRecallDone = true;
          render();
          return;
        }

        render();
      };
  }

  return makeSlide({idx, bg:"var(--purple)", navHidden:false, inner});
}

function screenFinalRecall(idx){
  const inner = document.createElement("div");
  inner.style.display = "flex";
  inner.style.flexDirection = "column";
  inner.style.height = "100%";

  inner.innerHTML = `
    <div class="learn-layout">
      <div class="learn-ref">
        <div class="verse-ref-pill">${VERSE_REF}</div>
      </div>

      <div class="learn-verse">
        <div id="finalRecallStage"></div>
      </div>

      <div class="learn-coach">
        <div>
          <div class="coach-title">Say the Whole Verse</div>
          ${
            State.finalRecallActive
              ? `<div class="timer-wrap"><div class="timer-bar" id="finalRecallBar" style="width:${getFinalRecallPct() * 100}%"></div></div>`
              : `<div class="coach-text">Try saying the entire verse from memory.</div>`
          }
        </div>

        <div class="coach-actions">
          ${
            State.finalRecallDone
              ? `<button class="carousel-main no-zoom" id="btnFinalContinue" style="max-width:520px;">Continue</button>`
              : ``
          }
        </div>
      </div>
    </div>
  `;

  inner.querySelector("#finalRecallStage").appendChild(finalRecallNode());

  const btnFinalContinue = inner.querySelector("#btnFinalContinue");
  if (btnFinalContinue){
    btnFinalContinue.onclick = () => {
      go(Screen.CELEBRATION);
    };
  }

  if (State.finalRecallActive){
    const animate = () => {
      const pct = getFinalRecallPct();
      const currentBar = document.getElementById("finalRecallBar");

      if (currentBar){
        currentBar.style.width = (pct * 100) + "%";
      }

      if (pct > 0 && State.finalRecallActive){
        requestAnimationFrame(animate);
      }
    };

    requestAnimationFrame(animate);
  }

  return makeSlide({idx, bg:"var(--purple)", navHidden:false, inner});
}

function screenCelebration(idx){
  const wrap = document.createElement("div");
  wrap.className = "celebration-screen";

  wrap.innerHTML = `
    <canvas id="fireworksCanvas"></canvas>

    <h2>Great Job Learning the Verse!</h2>

    <div class="celebration-actions">
      <button class="carousel-main no-zoom" id="btnCelebrateTitle">Title Screen</button>
      <button class="carousel-main no-zoom" id="btnCelebrateGames">Verse Games</button>
    </div>
  `;

  const canvas = wrap.querySelector("#fireworksCanvas");
  setTimeout(() => {
    if (State.screen === Screen.CELEBRATION){
      startFireworks(canvas);
    }
  }, 0);

  wrap.querySelector("#btnCelebrateTitle").onclick = () => {
    stopFireworks();
    go(Screen.TITLE);
  };

  wrap.querySelector("#btnCelebrateGames").onclick = () => {
    stopFireworks();
    go(Screen.PRACTICE);
  };

  return makeSlide({idx, bg:"var(--purple)", navHidden:true, inner: wrap});
}

function screenPractice(idx){
  const wrap = document.createElement("div");
  wrap.className = "title-screen";
  const g = PRACTICE_GAMES[State.practiceIndex];

  wrap.innerHTML = `
    <div class="title-content">
      <h2>Practice Games</h2>

      <div class="title-carousel">
        <button class="carousel-arrow no-zoom" id="pPrev" aria-label="Previous">${SVG_BACK}</button>

        <button class="carousel-main no-zoom" id="pMain" style="display:flex; flex-direction:column; gap:6px; align-items:center; justify-content:center;">
          <div style="font-size:20px; font-weight:900;">${g.title}</div>
          <div style="font-size:14px; opacity:0.85; font-weight:700;">${g.desc}</div>
          <div style="font-size:12px; opacity:0.75; font-weight:800; margin-top:2px;">Tap for details</div>
        </button>

        <button class="carousel-arrow no-zoom" id="pNext" aria-label="Next">${SVG_FORWARD}</button>
      </div>

      <div class="carousel-dots" id="pDots"></div>

      <div class="small" style="max-width: 60ch; margin-top: 10px;">
        We'll add the full games next. For now, this is the practice hub.
      </div>
    </div>
  `;

  wrap.querySelector("#pPrev").onclick = (e)=>{ e.stopPropagation(); practicePrev(); };
  wrap.querySelector("#pNext").onclick = (e)=>{ e.stopPropagation(); practiceNext(); };
  wrap.querySelector("#pMain").onclick = (e)=>{ e.stopPropagation(); practiceRun(); };

  const dots = wrap.querySelector("#pDots");
  dots.innerHTML = PRACTICE_GAMES.map((_, i) =>
    `<span class="carousel-dot ${i === State.practiceIndex ? "active" : ""}"></span>`
  ).join("");

  return makeSlide({idx, bg:"var(--purple)", navHidden:false, inner: wrap});
}

/* Render */
function render(){
  app.innerHTML = "";

  const currentIdx = screenToIndex(State.screen);

  let indicesToRender;
  if (State.isSliding) {
    indicesToRender = [State.transitionFromIdx, State.transitionToIdx];
  } else {
    indicesToRender = [currentIdx];
  }

  const uniq = Array.from(new Set(indicesToRender.filter(i => i !== null && i >= 0)));
  for (const idx of uniq){
    const screen = ["intro","title","listen","echo","hide","final_recall","celebration","practice"][idx];
    let slide = null;
    if (screen === Screen.INTRO) slide = screenIntro(idx);
    if (screen === Screen.TITLE) slide = screenTitle(idx);
    if (screen === Screen.LISTEN) slide = screenListen(idx);
    if (screen === Screen.ECHO) slide = screenEcho(idx);
    if (screen === Screen.HIDE) slide = screenHide(idx);
    if (screen === Screen.FINAL_RECALL) slide = screenFinalRecall(idx);
    if (screen === Screen.CELEBRATION) slide = screenCelebration(idx);
    if (screen === Screen.PRACTICE) slide = screenPractice(idx);
    if (slide) app.appendChild(slide);
  }

  // Ensure transform matches current slideX
  if (!State.isSliding) {
    State.slideX = currentIdx;
  }
  updateSlideTransforms();

  renderNav();
}

/* Bootstrap */
(async function init(){
  try{
    await loadVerse(getVerseIdFromUrl());
  }catch(e){
    // Show a friendly error (still allow app shell)
    console.error(e);
    showDialog({
      title: "Verse JSON not found",
      body: String(e.message || e),
      actions: [dlgBtn("OK", {onClick: closeDialog})]
    });
  }

  // start on intro
  setScreen(Screen.INTRO);
  applyMute();
})();
</script>
</body>
