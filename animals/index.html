  <button onclick="chooseTwoAnimals()">Choose Two Animals</button>

  <div id="result" class="result">Your two animals will appear here.</div>

  <script>
    function chooseTwoAnimals() {
      const text = document.getElementById('animalList').value;

      // Split by line, trim extra spaces, and remove blank lines.
      const animals = text
        .split('\n')
        .map(animal => animal.trim())
        .filter(animal => animal.length > 0);

      const result = document.getElementById('result');

      if (animals.length < 2) {
        result.textContent = 'Please enter at least two animals.';
        return;
      }

      const firstIndex = Math.floor(Math.random() * animals.length);
      let secondIndex = Math.floor(Math.random() * animals.length);

      // Make sure the second animal is different from the first.
      while (secondIndex === firstIndex) {
        secondIndex = Math.floor(Math.random() * animals.length);
      }

      result.textContent = animals[firstIndex] + ' + ' + animals[secondIndex];
    }
  </script>
