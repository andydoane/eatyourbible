<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>90</title>
  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #timer {
      font-size: clamp(8rem, 35vw, 28rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.06em;
      user-select: none;
    }

    #message {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(1rem, 2vw, 1.5rem);
      opacity: 0.8;
      text-align: center;
      white-space: nowrap;
    }

    button {
      position: fixed;
      top: 1rem;
      right: 1rem;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      background: #fff;
      color: #000;
      font-weight: 700;
    }

    button:hover {
      opacity: 0.85;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="timer">90</div>
  <div id="message">Click “Enable notifications” to get an alert when time is up.</div>
  <button id="notifyButton">Enable notifications</button>

  <script>
    const START_SECONDS = 90;

    const timerElement = document.getElementById("timer");
    const messageElement = document.getElementById("message");
    const notifyButton = document.getElementById("notifyButton");

    let secondsLeft = START_SECONDS;
    let hasFinished = false;

    function updateDisplay() {
      timerElement.textContent = secondsLeft;
      document.title = String(secondsLeft);
    }

    function sendFinishedNotification() {
      if (!("Notification" in window)) {
        alert("Time is up!");
        return;
      }

      if (Notification.permission === "granted") {
        new Notification("Time is up!", {
          body: "Your 90 second timer has finished."
        });
      } else {
        alert("Time is up!");
      }
    }

    function finishTimer() {
      if (hasFinished) return;

      hasFinished = true;
      secondsLeft = 0;
      updateDisplay();

      messageElement.textContent = "Time is up!";
      document.title = "Time is up!";

      sendFinishedNotification();
    }

    function tick() {
      if (hasFinished) return;

      secondsLeft -= 1;

      if (secondsLeft <= 0) {
        finishTimer();
      } else {
        updateDisplay();
      }
    }

    notifyButton.addEventListener("click", async () => {
      if (!("Notification" in window)) {
        messageElement.textContent = "This browser does not support notifications.";
        notifyButton.classList.add("hidden");
        return;
      }

      const permission = await Notification.requestPermission();

      if (permission === "granted") {
        messageElement.textContent = "Notifications enabled. Timer running.";
      } else {
        messageElement.textContent = "Notifications not enabled. You’ll still see the timer finish on screen.";
      }

      notifyButton.classList.add("hidden");
    });

    updateDisplay();
    setInterval(tick, 1000);
  </script>
</body>
</html>
